<svg viewBox="0 0 960 560" xmlns="http://www.w3.org/2000/svg" font-family="Inter, -apple-system, sans-serif">
  <rect x="0" y="0" width="960" height="560" fill="#F4F3EF"/>
  <text x="480" y="38" text-anchor="middle" font-size="22" font-weight="600" fill="#191919">DeepSpeed Ulysses: Transpose the Split With All-to-All</text>
  <text x="480" y="60" text-anchor="middle" font-size="13" fill="#6B6B6B">one communication step turns a sequence-parallel layout into a head-parallel layout, and back again</text>

  <defs>
    <marker id="uarrow" markerWidth="9" markerHeight="9" refX="4.5" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#191919"/>
    </marker>
  </defs>

  <text x="230" y="132" text-anchor="middle" font-size="13.5" font-weight="600" fill="#191919">before: split by sequence</text>
  <text x="230" y="470" text-anchor="middle" font-size="11.5" fill="#6B6B6B">each GPU: all heads, 1/4 of sequence positions</text>

  <!-- Panel A: column split (sequence) -->
  <rect x="80" y="150" width="40" height="40" fill="#D97757" stroke="#191919" stroke-width="0.8"/>
  <rect x="120" y="150" width="40" height="40" fill="#D97757" stroke="#191919" stroke-width="0.8"/>
  <rect x="160" y="150" width="40" height="40" fill="#8DA399" stroke="#191919" stroke-width="0.8"/>
  <rect x="200" y="150" width="40" height="40" fill="#8DA399" stroke="#191919" stroke-width="0.8"/>
  <rect x="240" y="150" width="40" height="40" fill="#E3EBF2" stroke="#191919" stroke-width="0.8"/>
