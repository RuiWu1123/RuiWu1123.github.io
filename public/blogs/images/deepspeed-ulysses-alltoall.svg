  <rect x="320" y="150" width="40" height="40" fill="#F3ECE2" stroke="#191919" stroke-width="0.8"/>
  <rect x="360" y="150" width="40" height="40" fill="#F3ECE2" stroke="#191919" stroke-width="0.8"/>
  <rect x="80" y="190" width="40" height="40" fill="#D97757" stroke="#191919" stroke-width="0.8"/>
  <rect x="120" y="190" width="40" height="40" fill="#D97757" stroke="#191919" stroke-width="0.8"/>
  <rect x="160" y="190" width="40" height="40" fill="#8DA399" stroke="#191919" stroke-width="0.8"/>
  <rect x="200" y="190" width="40" height="40" fill="#8DA399" stroke="#191919" stroke-width="0.8"/>
  <rect x="240" y="190" width="40" height="40" fill="#E3EBF2" stroke="#191919" stroke-width="0.8"/>
  <rect x="280" y="190" width="40" height="40" fill="#E3EBF2" stroke="#191919" stroke-width="0.8"/>
  <rect x="320" y="190" width="40" height="40" fill="#F3ECE2" stroke="#191919" stroke-width="0.8"/>
  <rect x="360" y="190" width="40" height="40" fill="#F3ECE2" stroke="#191919" stroke-width="0.8"/>
  <rect x="80" y="230" width="40" height="40" fill="#D97757" stroke="#191919" stroke-width="0.8"/>
  <rect x="120" y="230" width="40" height="40" fill="#D97757" stroke="#191919" stroke-width="0.8"/>
  <rect x="160" y="230" width="40" height="40" fill="#8DA399" stroke="#191919" stroke-width="0.8"/>
  <rect x="200" y="230" width="40" height="40" fill="#8DA399" stroke="#191919" stroke-width="0.8"/>
  <rect x="240" y="230" width="40" height="40" fill="#E3EBF2" stroke="#191919" stroke-width="0.8"/>
  <rect x="280" y="230" width="40" height="40" fill="#E3EBF2" stroke="#191919" stroke-width="0.8"/>
  <rect x="320" y="230" width="40" height="40" fill="#F3ECE2" stroke="#191919" stroke-width="0.8"/>
  <rect x="360" y="230" width="40" height="40" fill="#F3ECE2" stroke="#191919" stroke-width="0.8"/>
  <rect x="80" y="270" width="40" height="40" fill="#D97757" stroke="#191919" stroke-width="0.8"/>
  <rect x="120" y="270" width="40" height="40" fill="#D97757" stroke="#191919" stroke-width="0.8"/>
  <rect x="160" y="270" width="40" height="40" fill="#8DA399" stroke="#191919" stroke-width="0.8"/>
  <rect x="200" y="270" width="40" height="40" fill="#8DA399" stroke="#191919" stroke-width="0.8"/>
  <rect x="240" y="270" width="40" height="40" fill="#E3EBF2" stroke="#191919" stroke-width="0.8"/>
  <rect x="280" y="270" width="40" height="40" fill="#E3EBF2" stroke="#191919" stroke-width="0.8"/>
  <rect x="320" y="270" width="40" height="40" fill="#F3ECE2" stroke="#191919" stroke-width="0.8"/>
  <rect x="360" y="270" width="40" height="40" fill="#F3ECE2" stroke="#191919" stroke-width="0.8"/>

  <text x="35" y="175" text-anchor="middle" font-size="10.5" fill="#6B6B6B">heads</text>
  <text x="230" y="330" text-anchor="middle" font-size="10.5" fill="#6B6B6B">sequence position →</text>

  <!-- Arrow between panels -->
  <line x1="410" y1="230" x2="530" y2="230" stroke="#191919" stroke-width="1.6" marker-end="url(#uarrow)"/>
  <text x="470" y="215" text-anchor="middle" font-size="12" font-weight="600" fill="#191919">All-to-All</text>

  <!-- Panel B: row split (heads) -->
  <text x="700" y="132" text-anchor="middle" font-size="13.5" font-weight="600" fill="#191919">after: split by heads</text>
  <text x="700" y="470" text-anchor="middle" font-size="11.5" fill="#6B6B6B">each GPU: full sequence, 1/4 of the attention heads</text>

  <rect x="560" y="150" width="40" height="40" fill="#D97757" stroke="#191919" stroke-width="0.8"/>
  <rect x="600" y="150" width="40" height="40" fill="#D97757" stroke="#191919" stroke-width="0.8"/>
  <rect x="640" y="150" width="40" height="40" fill="#D97757" stroke="#191919" stroke-width="0.8"/>
  <rect x="680" y="150" width="40" height="40" fill="#D97757" stroke="#191919" stroke-width="0.8"/>
  <rect x="720" y="150" width="40" height="40" fill="#D97757" stroke="#191919" stroke-width="0.8"/>
  <rect x="760" y="150" width="40" height="40" fill="#D97757" stroke="#191919" stroke-width="0.8"/>
  <rect x="800" y="150" width="40" height="40" fill="#D97757" stroke="#191919" stroke-width="0.8"/>
  <rect x="840" y="150" width="40" height="40" fill="#D97757" stroke="#191919" stroke-width="0.8"/>
  <rect x="560" y="190" width="40" height="40" fill="#8DA399" stroke="#191919" stroke-width="0.8"/>
  <rect x="600" y="190" width="40" height="40" fill="#8DA399" stroke="#191919" stroke-width="0.8"/>
  <rect x="640" y="190" width="40" height="40" fill="#8DA399" stroke="#191919" stroke-width="0.8"/>
  <rect x="680" y="190" width="40" height="40" fill="#8DA399" stroke="#191919" stroke-width="0.8"/>
