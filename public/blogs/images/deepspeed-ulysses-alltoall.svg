  <rect x="760" y="190" width="40" height="40" fill="#8DA399" stroke="#191919" stroke-width="0.8"/>
  <rect x="800" y="190" width="40" height="40" fill="#8DA399" stroke="#191919" stroke-width="0.8"/>
  <rect x="840" y="190" width="40" height="40" fill="#8DA399" stroke="#191919" stroke-width="0.8"/>
  <rect x="560" y="230" width="40" height="40" fill="#E3EBF2" stroke="#191919" stroke-width="0.8"/>
  <rect x="600" y="230" width="40" height="40" fill="#E3EBF2" stroke="#191919" stroke-width="0.8"/>
  <rect x="640" y="230" width="40" height="40" fill="#E3EBF2" stroke="#191919" stroke-width="0.8"/>
  <rect x="680" y="230" width="40" height="40" fill="#E3EBF2" stroke="#191919" stroke-width="0.8"/>
  <rect x="720" y="230" width="40" height="40" fill="#E3EBF2" stroke="#191919" stroke-width="0.8"/>
  <rect x="760" y="230" width="40" height="40" fill="#E3EBF2" stroke="#191919" stroke-width="0.8"/>
  <rect x="800" y="230" width="40" height="40" fill="#E3EBF2" stroke="#191919" stroke-width="0.8"/>
  <rect x="840" y="230" width="40" height="40" fill="#E3EBF2" stroke="#191919" stroke-width="0.8"/>
  <rect x="560" y="270" width="40" height="40" fill="#F3ECE2" stroke="#191919" stroke-width="0.8"/>
  <rect x="600" y="270" width="40" height="40" fill="#F3ECE2" stroke="#191919" stroke-width="0.8"/>
  <rect x="640" y="270" width="40" height="40" fill="#F3ECE2" stroke="#191919" stroke-width="0.8"/>
  <rect x="680" y="270" width="40" height="40" fill="#F3ECE2" stroke="#191919" stroke-width="0.8"/>
  <rect x="720" y="270" width="40" height="40" fill="#F3ECE2" stroke="#191919" stroke-width="0.8"/>
  <rect x="760" y="270" width="40" height="40" fill="#F3ECE2" stroke="#191919" stroke-width="0.8"/>
  <rect x="800" y="270" width="40" height="40" fill="#F3ECE2" stroke="#191919" stroke-width="0.8"/>
  <rect x="840" y="270" width="40" height="40" fill="#F3ECE2" stroke="#191919" stroke-width="0.8"/>

  <text x="700" y="330" text-anchor="middle" font-size="10.5" fill="#6B6B6B">sequence position →</text>

  <text x="480" y="410" text-anchor="middle" font-size="13" font-weight="600" fill="#191919">each GPU now holds every position but only its own heads — attention runs fully local, no more communication</text>
  <text x="480" y="500" text-anchor="middle" font-size="13" fill="#191919" font-weight="600">a second All-to-All after attention swaps the layout back for the rest of the layer</text>
  <text x="480" y="522" text-anchor="middle" font-size="12" fill="#6B6B6B">parallelism degree is capped by the number of heads — can't split further than 1 GPU per head</text>
</svg>
