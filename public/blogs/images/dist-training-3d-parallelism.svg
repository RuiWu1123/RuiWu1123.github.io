<svg viewBox="0 0 1100 660" xmlns="http://www.w3.org/2000/svg" font-family="Inter, -apple-system, sans-serif">
  <rect x="0" y="0" width="1100" height="660" fill="#F4F3EF"/>
  <text x="550" y="38" text-anchor="middle" font-size="22" font-weight="600" fill="#191919">Nesting the Axes: 3D (and 4D) Parallelism</text>
  <text x="550" y="60" text-anchor="middle" font-size="13" fill="#6B6B6B">each axis is assigned to the fastest link it can tolerate — tightest, most frequent traffic goes innermost</text>

  <defs>
    <marker id="dparrow" markerWidth="9" markerHeight="9" refX="4.5" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#191919"/>
    </marker>
  </defs>

  <!-- DP replica 0 -->
  <rect x="40" y="100" width="480" height="430" rx="12" fill="none" stroke="#191919" stroke-width="1.6" stroke-dasharray="7 5"/>
  <text x="280" y="126" text-anchor="middle" font-size="14" font-weight="600" fill="#191919">DP replica 0</text>

  <!-- PP stage 0 -->
  <rect x="65" y="146" width="195" height="360" rx="10" fill="#E6E4DD" stroke="#191919" stroke-width="1.3"/>
  <text x="162" y="170" text-anchor="middle" font-size="12.5" font-weight="600" fill="#191919">PP stage 0</text>
  <rect x="90" y="230" width="145" height="90" rx="6" fill="#D97757" stroke="#191919" stroke-width="1"/>
  <text x="162" y="268" text-anchor="middle" font-size="11.5" fill="#F4F3EF">TP = 4</text>
  <text x="162" y="284" text-anchor="middle" font-size="10.5" fill="#F4F3EF">NVLink domain</text>
  <text x="162" y="345" text-anchor="middle" font-size="10.5" fill="#6B6B6B">layers 0–L/2</text>

  <!-- PP stage 1 -->
  <rect x="285" y="146" width="195" height="360" rx="10" fill="#E6E4DD" stroke="#191919" stroke-width="1.3"/>
  <text x="382" y="170" text-anchor="middle" font-size="12.5" font-weight="600" fill="#191919">PP stage 1</text>
  <rect x="310" y="230" width="145" height="90" rx="6" fill="#D97757" stroke="#191919" stroke-width="1"/>
  <text x="382" y="268" text-anchor="middle" font-size="11.5" fill="#F4F3EF">TP = 4</text>
  <text x="382" y="284" text-anchor="middle" font-size="10.5" fill="#F4F3EF">NVLink domain</text>
  <text x="382" y="345" text-anchor="middle" font-size="10.5" fill="#6B6B6B">layers L/2–L</text>

  <line x1="260" y1="275" x2="285" y2="275" stroke="#191919" stroke-width="1.4" marker-end="url(#dparrow)"/>
  <text x="272" y="400" font-size="9.5" fill="#6B6B6B" transform="rotate(-90 272 400)" text-anchor="middle">activations / gradients</text>

  <!-- DP replica 1 -->
  <rect x="580" y="100" width="480" height="430" rx="12" fill="none" stroke="#191919" stroke-width="1.6" stroke-dasharray="7 5"/>
  <text x="820" y="126" text-anchor="middle" font-size="14" font-weight="600" fill="#191919">DP replica 1</text>

  <rect x="605" y="146" width="195" height="360" rx="10" fill="#E6E4DD" stroke="#191919" stroke-width="1.3"/>
  <text x="702" y="170" text-anchor="middle" font-size="12.5" font-weight="600" fill="#191919">PP stage 0</text>
  <rect x="630" y="230" width="145" height="90" rx="6" fill="#D97757" stroke="#191919" stroke-width="1"/>
  <text x="702" y="268" text-anchor="middle" font-size="11.5" fill="#F4F3EF">TP = 4</text>
  <text x="702" y="284" text-anchor="middle" font-size="10.5" fill="#F4F3EF">NVLink domain</text>
  <text x="702" y="345" text-anchor="middle" font-size="10.5" fill="#6B6B6B">layers 0–L/2</text>

  <rect x="825" y="146" width="195" height="360" rx="10" fill="#E6E4DD" stroke="#191919" stroke-width="1.3"/>
  <text x="922" y="170" text-anchor="middle" font-size="12.5" font-weight="600" fill="#191919">PP stage 1</text>
  <rect x="850" y="230" width="145" height="90" rx="6" fill="#D97757" stroke="#191919" stroke-width="1"/>
  <text x="922" y="268" text-anchor="middle" font-size="11.5" fill="#F4F3EF">TP = 4</text>
  <text x="922" y="284" text-anchor="middle" font-size="10.5" fill="#F4F3EF">NVLink domain</text>
  <text x="922" y="345" text-anchor="middle" font-size="10.5" fill="#6B6B6B">layers L/2–L</text>

  <line x1="800" y1="275" x2="825" y2="275" stroke="#191919" stroke-width="1.4" marker-end="url(#dparrow)"/>

  <!-- DP link between replicas -->
  <line x1="520" y1="590" x2="580" y2="590" stroke="#191919" stroke-width="1.4" stroke-dasharray="5 4" marker-end="url(#dparrow)"/>
  <line x1="580" y1="590" x2="520" y2="590" stroke="#191919" stroke-width="1.4" stroke-dasharray="5 4" marker-end="url(#dparrow)"/>
  <text x="550" y="612" text-anchor="middle" font-size="11.5" fill="#6B6B6B">DP: gradient all-reduce</text>

  <text x="550" y="558" text-anchor="middle" font-size="12" fill="#191919" font-weight="600">TP innermost (needs NVLink) → PP next (tolerates a slower hop) → DP outermost (least frequent, crosses any link)</text>
  <text x="550" y="642" text-anchor="middle" font-size="12" fill="#6B6B6B">a 5th axis (CP/SP, for long sequences) nests alongside TP — same NVLink-domain requirement</text>
</svg>
