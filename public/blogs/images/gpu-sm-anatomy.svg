<svg viewBox="0 0 960 620" xmlns="http://www.w3.org/2000/svg" font-family="Inter, -apple-system, sans-serif">
  <rect x="0" y="0" width="960" height="620" fill="#F4F3EF"/>

  <text x="480" y="42" text-anchor="middle" font-size="24" font-weight="600" fill="#191919">Inside One Streaming Multiprocessor (SM)</text>
  <text x="480" y="66" text-anchor="middle" font-size="14" fill="#6B6B6B">A modern GPU is a chip full of these — H100 has 132 of them</text>

  <!-- SM outer box -->
  <rect x="90" y="95" width="780" height="470" rx="14" fill="#E6E4DD" stroke="#191919" stroke-width="1.5"/>

  <!-- Warp Schedulers row -->
  <rect x="120" y="120" width="720" height="60" rx="8" fill="#E3EBF2" stroke="#191919" stroke-width="1"/>
  <text x="480" y="145" text-anchor="middle" font-size="14" font-weight="600" fill="#191919">4× Warp Schedulers</text>
  <text x="480" y="164" text-anchor="middle" font-size="11.5" fill="#6B6B6B">each picks a ready warp (32 threads) and issues its next instruction, every cycle</text>

  <!-- Four partitions -->
  <g>
    <!-- Partition 1 -->
    <rect x="120" y="195" width="170" height="230" rx="8" fill="#F3ECE2" stroke="#191919" stroke-width="1"/>
    <rect x="132" y="207" width="146" height="90" rx="5" fill="#D97757" stroke="#191919" stroke-width="1"/>
    <text x="205" y="230" text-anchor="middle" font-size="11.5" fill="#F4F3EF" font-weight="600">32× FP32/INT</text>
    <text x="205" y="246" text-anchor="middle" font-size="11.5" fill="#F4F3EF" font-weight="600">CUDA Cores</text>
    <text x="205" y="264" text-anchor="middle" font-size="10" fill="#F4F3EF">1 warp = 32 threads,</text>
    <text x="205" y="278" text-anchor="middle" font-size="10" fill="#F4F3EF">one instruction, lock-step</text>
    <rect x="132" y="305" width="146" height="46" rx="5" fill="#8DA399" stroke="#191919" stroke-width="1"/>
    <text x="205" y="332" text-anchor="middle" font-size="11" fill="#191919">1× Tensor Core</text>
    <rect x="132" y="359" width="146" height="52" rx="5" fill="#E3EBF2" stroke="#191919" stroke-width="1"/>
    <text x="205" y="380" text-anchor="middle" font-size="10.5" fill="#191919">Register File</text>
    <text x="205" y="396" text-anchor="middle" font-size="9.5" fill="#6B6B6B">(slice)</text>

    <!-- Partition 2 -->
    <rect x="305" y="195" width="170" height="230" rx="8" fill="#F3ECE2" stroke="#191919" stroke-width="1"/>
    <rect x="317" y="207" width="146" height="90" rx="5" fill="#D97757" stroke="#191919" stroke-width="1"/>
    <text x="390" y="230" text-anchor="middle" font-size="11.5" fill="#F4F3EF" font-weight="600">32× FP32/INT</text>
    <text x="390" y="246" text-anchor="middle" font-size="11.5" fill="#F4F3EF" font-weight="600">CUDA Cores</text>
    <text x="390" y="264" text-anchor="middle" font-size="10" fill="#F4F3EF">1 warp = 32 threads,</text>
    <text x="390" y="278" text-anchor="middle" font-size="10" fill="#F4F3EF">one instruction, lock-step</text>
    <rect x="317" y="305" width="146" height="46" rx="5" fill="#8DA399" stroke="#191919" stroke-width="1"/>
    <text x="390" y="332" text-anchor="middle" font-size="11" fill="#191919">1× Tensor Core</text>
    <rect x="317" y="359" width="146" height="52" rx="5" fill="#E3EBF2" stroke="#191919" stroke-width="1"/>
    <text x="390" y="380" text-anchor="middle" font-size="10.5" fill="#191919">Register File</text>
    <text x="390" y="396" text-anchor="middle" font-size="9.5" fill="#6B6B6B">(slice)</text>

    <!-- Partition 3 -->
    <rect x="490" y="195" width="170" height="230" rx="8" fill="#F3ECE2" stroke="#191919" stroke-width="1"/>
    <rect x="502" y="207" width="146" height="90" rx="5" fill="#D97757" stroke="#191919" stroke-width="1"/>
    <text x="575" y="230" text-anchor="middle" font-size="11.5" fill="#F4F3EF" font-weight="600">32× FP32/INT</text>
    <text x="575" y="246" text-anchor="middle" font-size="11.5" fill="#F4F3EF" font-weight="600">CUDA Cores</text>
    <text x="575" y="264" text-anchor="middle" font-size="10" fill="#F4F3EF">1 warp = 32 threads,</text>
    <text x="575" y="278" text-anchor="middle" font-size="10" fill="#F4F3EF">one instruction, lock-step</text>
    <rect x="502" y="305" width="146" height="46" rx="5" fill="#8DA399" stroke="#191919" stroke-width="1"/>
    <text x="575" y="332" text-anchor="middle" font-size="11" fill="#191919">1× Tensor Core</text>
    <rect x="502" y="359" width="146" height="52" rx="5" fill="#E3EBF2" stroke="#191919" stroke-width="1"/>
    <text x="575" y="380" text-anchor="middle" font-size="10.5" fill="#191919">Register File</text>
    <text x="575" y="396" text-anchor="middle" font-size="9.5" fill="#6B6B6B">(slice)</text>

    <!-- Partition 4 -->
    <rect x="675" y="195" width="170" height="230" rx="8" fill="#F3ECE2" stroke="#191919" stroke-width="1"/>
    <rect x="687" y="207" width="146" height="90" rx="5" fill="#D97757" stroke="#191919" stroke-width="1"/>
    <text x="760" y="230" text-anchor="middle" font-size="11.5" fill="#F4F3EF" font-weight="600">32× FP32/INT</text>
    <text x="760" y="246" text-anchor="middle" font-size="11.5" fill="#F4F3EF" font-weight="600">CUDA Cores</text>
    <text x="760" y="264" text-anchor="middle" font-size="10" fill="#F4F3EF">1 warp = 32 threads,</text>
    <text x="760" y="278" text-anchor="middle" font-size="10" fill="#F4F3EF">one instruction, lock-step</text>
    <rect x="687" y="305" width="146" height="46" rx="5" fill="#8DA399" stroke="#191919" stroke-width="1"/>
    <text x="760" y="332" text-anchor="middle" font-size="11" fill="#191919">1× Tensor Core</text>
    <rect x="687" y="359" width="146" height="52" rx="5" fill="#E3EBF2" stroke="#191919" stroke-width="1"/>
    <text x="760" y="380" text-anchor="middle" font-size="10.5" fill="#191919">Register File</text>
    <text x="760" y="396" text-anchor="middle" font-size="9.5" fill="#6B6B6B">(slice)</text>
  </g>

  <!-- Shared memory / L1 -->
  <rect x="120" y="425" width="725" height="60" rx="8" fill="#8DA399" stroke="#191919" stroke-width="1" fill-opacity="0.55"/>
  <text x="480" y="450" text-anchor="middle" font-size="14" font-weight="600" fill="#191919">Shared Memory / L1 Cache (~256 KB, on-chip, split at kernel launch)</text>
  <text x="480" y="470" text-anchor="middle" font-size="11.5" fill="#191919">software-managed scratchpad — the key to reusing data instead of re-fetching from HBM</text>

  <!-- Bottom note -->
  <text x="480" y="510" text-anchor="middle" font-size="12.5" fill="#191919" font-weight="600">One thread block runs entirely on one SM.</text>
  <text x="480" y="530" text-anchor="middle" font-size="12" fill="#6B6B6B">How many blocks fit at once depends on how many registers &amp; how much shared memory each block needs — this is "occupancy."</text>

  <!-- Legend -->
  <rect x="120" y="545" width="14" height="14" fill="#D97757"/>
  <text x="140" y="557" font-size="11" fill="#191919">CUDA core (scalar/vector FMA)</text>
  <rect x="360" y="545" width="14" height="14" fill="#8DA399"/>
  <text x="380" y="557" font-size="11" fill="#191919">Tensor core (matrix FMA)</text>
  <rect x="580" y="545" width="14" height="14" fill="#E3EBF2" stroke="#191919" stroke-width="1"/>
  <text x="600" y="557" font-size="11" fill="#191919">Memory / control</text>
</svg>
