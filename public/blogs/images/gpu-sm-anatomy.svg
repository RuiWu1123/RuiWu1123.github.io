<svg viewBox="0 0 960 640" xmlns="http://www.w3.org/2000/svg" font-family="Inter, -apple-system, sans-serif">
  <rect x="0" y="0" width="960" height="640" fill="#F4F3EF"/>

  <text x="480" y="36" text-anchor="middle" font-size="22" font-weight="600" fill="#191919">Inside One Streaming Multiprocessor (SM)</text>
  <text x="480" y="58" text-anchor="middle" font-size="13" fill="#6B6B6B">an H100 has 132 of these on one chip</text>

  <!-- SM outer box -->
  <rect x="70" y="80" width="820" height="490" rx="14" fill="#E6E4DD" stroke="#191919" stroke-width="1.5"/>

  <!-- Warp Schedulers row -->
  <rect x="100" y="102" width="760" height="58" rx="8" fill="#E3EBF2" stroke="#191919" stroke-width="1"/>
  <text x="480" y="126" text-anchor="middle" font-size="14.5" font-weight="600" fill="#191919">4× Warp Schedulers</text>
  <text x="480" y="145" text-anchor="middle" font-size="11.5" fill="#6B6B6B">issue the next instruction for a ready warp (32 threads), every cycle</text>

  <!-- Four partitions -->
  <g>
    <rect x="100" y="176" width="178" height="270" rx="8" fill="#F3ECE2" stroke="#191919" stroke-width="1"/>
    <rect x="113" y="190" width="152" height="104" rx="5" fill="#D97757" stroke="#191919" stroke-width="1"/>
    <text x="189" y="220" text-anchor="middle" font-size="12.5" fill="#F4F3EF" font-weight="600">32× FP32/INT</text>
    <text x="189" y="238" text-anchor="middle" font-size="12.5" fill="#F4F3EF" font-weight="600">CUDA Cores</text>
    <text x="189" y="260" text-anchor="middle" font-size="10.5" fill="#F4F3EF">1 warp = 32 threads,</text>
    <text x="189" y="276" text-anchor="middle" font-size="10.5" fill="#F4F3EF">lock-step (SIMT)</text>
    <rect x="113" y="304" width="152" height="54" rx="5" fill="#8DA399" stroke="#191919" stroke-width="1"/>
    <text x="189" y="336" text-anchor="middle" font-size="12" fill="#191919">1× Tensor Core</text>
    <rect x="113" y="368" width="152" height="62" rx="5" fill="#E3EBF2" stroke="#191919" stroke-width="1"/>
    <text x="189" y="394" text-anchor="middle" font-size="11.5" fill="#191919">Register File</text>
    <text x="189" y="411" text-anchor="middle" font-size="10" fill="#6B6B6B">(slice)</text>

    <rect x="288" y="176" width="178" height="270" rx="8" fill="#F3ECE2" stroke="#191919" stroke-width="1"/>
    <rect x="301" y="190" width="152" height="104" rx="5" fill="#D97757" stroke="#191919" stroke-width="1"/>
    <text x="377" y="220" text-anchor="middle" font-size="12.5" fill="#F4F3EF" font-weight="600">32× FP32/INT</text>
    <text x="377" y="238" text-anchor="middle" font-size="12.5" fill="#F4F3EF" font-weight="600">CUDA Cores</text>
    <text x="377" y="260" text-anchor="middle" font-size="10.5" fill="#F4F3EF">1 warp = 32 threads,</text>
    <text x="377" y="276" text-anchor="middle" font-size="10.5" fill="#F4F3EF">lock-step (SIMT)</text>
    <rect x="301" y="304" width="152" height="54" rx="5" fill="#8DA399" stroke="#191919" stroke-width="1"/>
    <text x="377" y="336" text-anchor="middle" font-size="12" fill="#191919">1× Tensor Core</text>
    <rect x="301" y="368" width="152" height="62" rx="5" fill="#E3EBF2" stroke="#191919" stroke-width="1"/>
    <text x="377" y="394" text-anchor="middle" font-size="11.5" fill="#191919">Register File</text>
    <text x="377" y="411" text-anchor="middle" font-size="10" fill="#6B6B6B">(slice)</text>

    <rect x="476" y="176" width="178" height="270" rx="8" fill="#F3ECE2" stroke="#191919" stroke-width="1"/>
    <rect x="489" y="190" width="152" height="104" rx="5" fill="#D97757" stroke="#191919" stroke-width="1"/>
    <text x="565" y="220" text-anchor="middle" font-size="12.5" fill="#F4F3EF" font-weight="600">32× FP32/INT</text>
    <text x="565" y="238" text-anchor="middle" font-size="12.5" fill="#F4F3EF" font-weight="600">CUDA Cores</text>
    <text x="565" y="260" text-anchor="middle" font-size="10.5" fill="#F4F3EF">1 warp = 32 threads,</text>
    <text x="565" y="276" text-anchor="middle" font-size="10.5" fill="#F4F3EF">lock-step (SIMT)</text>
    <rect x="489" y="304" width="152" height="54" rx="5" fill="#8DA399" stroke="#191919" stroke-width="1"/>
    <text x="565" y="336" text-anchor="middle" font-size="12" fill="#191919">1× Tensor Core</text>
    <rect x="489" y="368" width="152" height="62" rx="5" fill="#E3EBF2" stroke="#191919" stroke-width="1"/>
    <text x="565" y="394" text-anchor="middle" font-size="11.5" fill="#191919">Register File</text>
    <text x="565" y="411" text-anchor="middle" font-size="10" fill="#6B6B6B">(slice)</text>

    <rect x="664" y="176" width="178" height="270" rx="8" fill="#F3ECE2" stroke="#191919" stroke-width="1"/>
    <rect x="677" y="190" width="152" height="104" rx="5" fill="#D97757" stroke="#191919" stroke-width="1"/>
    <text x="753" y="220" text-anchor="middle" font-size="12.5" fill="#F4F3EF" font-weight="600">32× FP32/INT</text>
    <text x="753" y="238" text-anchor="middle" font-size="12.5" fill="#F4F3EF" font-weight="600">CUDA Cores</text>
    <text x="753" y="260" text-anchor="middle" font-size="10.5" fill="#F4F3EF">1 warp = 32 threads,</text>
    <text x="753" y="276" text-anchor="middle" font-size="10.5" fill="#F4F3EF">lock-step (SIMT)</text>
    <rect x="677" y="304" width="152" height="54" rx="5" fill="#8DA399" stroke="#191919" stroke-width="1"/>
    <text x="753" y="336" text-anchor="middle" font-size="12" fill="#191919">1× Tensor Core</text>
    <rect x="677" y="368" width="152" height="62" rx="5" fill="#E3EBF2" stroke="#191919" stroke-width="1"/>
    <text x="753" y="394" text-anchor="middle" font-size="11.5" fill="#191919">Register File</text>
    <text x="753" y="411" text-anchor="middle" font-size="10" fill="#6B6B6B">(slice)</text>
  </g>

  <!-- Shared memory / L1 -->
  <rect x="100" y="446" width="742" height="66" rx="8" fill="#8DA399" fill-opacity="0.55" stroke="#191919" stroke-width="1"/>
  <text x="480" y="474" text-anchor="middle" font-size="14.5" font-weight="600" fill="#191919">Shared Memory / L1 Cache (~100–256 KB, on-chip)</text>
  <text x="480" y="495" text-anchor="middle" font-size="11.5" fill="#191919">software-managed scratchpad for reusing data instead of re-fetching from HBM</text>

  <!-- Legend -->
  <rect x="100" y="530" width="14" height="14" fill="#D97757"/>
  <text x="120" y="542" font-size="11.5" fill="#191919">CUDA core</text>
  <rect x="230" y="530" width="14" height="14" fill="#8DA399"/>
  <text x="250" y="542" font-size="11.5" fill="#191919">Tensor core</text>
  <rect x="370" y="530" width="14" height="14" fill="#E3EBF2" stroke="#191919" stroke-width="1"/>
  <text x="390" y="542" font-size="11.5" fill="#191919">Memory / control</text>

  <text x="480" y="600" text-anchor="middle" font-size="13" fill="#191919" font-weight="600">One thread block runs entirely on one SM — how many fit at once is "occupancy."</text>
</svg>
