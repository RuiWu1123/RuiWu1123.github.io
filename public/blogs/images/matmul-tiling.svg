<svg viewBox="0 0 960 560" xmlns="http://www.w3.org/2000/svg" font-family="Inter, -apple-system, sans-serif">
  <rect x="0" y="0" width="960" height="560" fill="#F4F3EF"/>
  <text x="480" y="42" text-anchor="middle" font-size="24" font-weight="600" fill="#191919">Tiling: How C = A × B Actually Runs on a GPU</text>
  <text x="480" y="66" text-anchor="middle" font-size="14" fill="#6B6B6B">one output tile of C is computed by one thread block, reusing tiles of A and B from shared memory</text>

  <!-- Matrix A -->
  <text x="150" y="110" text-anchor="middle" font-size="14" font-weight="600" fill="#191919">A</text>
  <rect x="60" y="120" width="180" height="260" fill="#F3ECE2" stroke="#191919" stroke-width="1.2"/>
  <rect x="60" y="185" width="180" height="40" fill="#D97757" stroke="#191919" stroke-width="1.2"/>
  <text x="150" y="210" text-anchor="middle" font-size="11" fill="#F4F3EF">tile of A (rows)</text>

  <!-- multiplication sign -->
  <text x="265" y="255" text-anchor="middle" font-size="26" fill="#191919">×</text>

  <!-- Matrix B -->
  <text x="400" y="110" text-anchor="middle" font-size="14" font-weight="600" fill="#191919">B</text>
  <rect x="320" y="120" width="260" height="260" fill="#F3ECE2" stroke="#191919" stroke-width="1.2"/>
  <rect x="410" y="120" width="42" height="260" fill="#8DA399" stroke="#191919" stroke-width="1.2"/>
  <text x="431" y="255" text-anchor="middle" font-size="11" fill="#191919" transform="rotate(-90 431,255)">tile of B (cols)</text>

  <!-- equals sign -->
  <text x="615" y="255" text-anchor="middle" font-size="26" fill="#191919">=</text>

  <!-- Matrix C -->
  <text x="770" y="110" text-anchor="middle" font-size="14" font-weight="600" fill="#191919">C</text>
  <rect x="650" y="120" width="260" height="260" fill="#F3ECE2" stroke="#191919" stroke-width="1.2"/>
  <rect x="740" y="185" width="42" height="40" fill="#E3EBF2" stroke="#191919" stroke-width="1.5"/>
  <text x="761" y="330" text-anchor="middle" font-size="11" fill="#191919">output tile</text>
  <text x="761" y="344" text-anchor="middle" font-size="11" fill="#191919">= 1 thread block</text>

  <!-- Arrows showing dependency -->
  <line x1="150" y1="225" x2="740" y2="205" stroke="#191919" stroke-width="1" stroke-dasharray="4 3"/>
  <line x1="431" y1="380" x2="761" y2="225" stroke="#191919" stroke-width="1" stroke-dasharray="4 3"/>

  <!-- Explanation box -->
  <rect x="60" y="410" width="850" height="120" rx="10" fill="#E6E4DD" stroke="#191919" stroke-width="1"/>
  <text x="80" y="435" font-size="13" fill="#191919" font-weight="600">Why this matters for arithmetic intensity:</text>
  <text x="80" y="458" font-size="12" fill="#191919">1. Load the A-tile and B-tile from slow HBM into fast on-chip shared memory — once.</text>
  <text x="80" y="478" font-size="12" fill="#191919">2. Every value in those tiles is then reused many times (once per output element in the tile) straight from shared memory.</text>
  <text x="80" y="498" font-size="12" fill="#191919">3. Bigger tiles / bigger matrices → more reuse per byte loaded → higher arithmetic intensity → closer to peak FLOPs.</text>
  <text x="80" y="518" font-size="12" fill="#6B6B6B">This is exactly why small batch sizes or tiny hidden dims under-use a GPU: too little reuse per byte moved.</text>
</svg>
