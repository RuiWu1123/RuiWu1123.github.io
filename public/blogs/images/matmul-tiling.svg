<svg viewBox="0 0 960 560" xmlns="http://www.w3.org/2000/svg" font-family="Inter, -apple-system, sans-serif">
  <rect x="0" y="0" width="960" height="560" fill="#F4F3EF"/>
  <text x="480" y="38" text-anchor="middle" font-size="22" font-weight="600" fill="#191919">Tiling: How C = A × B Runs on a GPU</text>
  <text x="480" y="60" text-anchor="middle" font-size="13" fill="#6B6B6B">one output tile of C = one thread block, reusing tiles of A and B from shared memory</text>

  <!-- Matrix A -->
  <text x="150" y="105" text-anchor="middle" font-size="16" font-weight="600" fill="#191919">A</text>
  <rect x="55" y="118" width="190" height="360" fill="#F3ECE2" stroke="#191919" stroke-width="1.3"/>
  <rect x="55" y="230" width="190" height="60" fill="#D97757" stroke="#191919" stroke-width="1.3"/>
  <text x="150" y="265" text-anchor="middle" font-size="13" fill="#F4F3EF">tile of A</text>

  <text x="270" y="315" text-anchor="middle" font-size="30" fill="#191919">×</text>

  <!-- Matrix B -->
  <text x="415" y="105" text-anchor="middle" font-size="16" font-weight="600" fill="#191919">B</text>
  <rect x="305" y="118" width="280" height="360" fill="#F3ECE2" stroke="#191919" stroke-width="1.3"/>
  <rect x="410" y="118" width="60" height="360" fill="#8DA399" stroke="#191919" stroke-width="1.3"/>
  <text x="440" y="180" text-anchor="middle" font-size="12" fill="#F4F3EF">tile</text>
  <text x="440" y="196" text-anchor="middle" font-size="12" fill="#F4F3EF">of B</text>

  <text x="620" y="315" text-anchor="middle" font-size="30" fill="#191919">=</text>

  <!-- Matrix C -->
  <text x="775" y="105" text-anchor="middle" font-size="16" font-weight="600" fill="#191919">C</text>
  <rect x="665" y="118" width="280" height="360" fill="#F3ECE2" stroke="#191919" stroke-width="1.3"/>
  <rect x="755" y="230" width="60" height="60" fill="#E3EBF2" stroke="#191919" stroke-width="1.6"/>
  <text x="785" y="500" text-anchor="middle" font-size="13" fill="#191919" font-weight="600">output tile = 1 thread block</text>
</svg>
