<svg viewBox="0 0 900 560" xmlns="http://www.w3.org/2000/svg" font-family="Inter, -apple-system, sans-serif">
  <rect x="0" y="0" width="900" height="560" fill="#F4F3EF"/>
  <text x="450" y="38" text-anchor="middle" font-size="22" font-weight="600" fill="#191919">Sequence Parallelism Fills In TP's Gaps</text>
  <text x="450" y="60" text-anchor="middle" font-size="13" fill="#6B6B6B">LayerNorm/dropout/residual split along the sequence axis instead of sitting replicated on every GPU</text>

  <defs>
    <marker id="sparrow" markerWidth="9" markerHeight="9" refX="4.5" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#191919"/>
    </marker>
  </defs>

  <!-- Row 1: Attention sublayer -->
  <text x="40" y="120" font-size="13" font-weight="600" fill="#191919">Attention sublayer</text>
  <rect x="40" y="140" width="120" height="60" rx="6" fill="#E3EBF2" stroke="#191919" stroke-width="1.2"/>
  <text x="100" y="165" text-anchor="middle" font-size="11.5" font-weight="600" fill="#191919">LayerNorm</text>
  <text x="100" y="182" text-anchor="middle" font-size="10.5" fill="#191919">SP: split by sequence</text>

  <line x1="160" y1="170" x2="230" y2="170" stroke="#191919" stroke-width="1.3" marker-end="url(#sparrow)"/>
  <text x="195" y="158" text-anchor="middle" font-size="9.5" fill="#6B6B6B">all-gather</text>

  <rect x="232" y="140" width="220" height="60" rx="6" fill="#D97757" stroke="#191919" stroke-width="1.2"/>
  <text x="342" y="165" text-anchor="middle" font-size="11.5" font-weight="600" fill="#F4F3EF">Attention</text>
  <text x="342" y="182" text-anchor="middle" font-size="10.5" fill="#F4F3EF">TP: split by heads/hidden</text>

  <line x1="452" y1="170" x2="522" y2="170" stroke="#191919" stroke-width="1.3" marker-end="url(#sparrow)"/>
  <text x="487" y="158" text-anchor="middle" font-size="9.5" fill="#6B6B6B">reduce-scatter</text>

  <rect x="524" y="140" width="150" height="60" rx="6" fill="#E3EBF2" stroke="#191919" stroke-width="1.2"/>
  <text x="599" y="165" text-anchor="middle" font-size="11.5" font-weight="600" fill="#191919">Dropout + residual</text>
  <text x="599" y="182" text-anchor="middle" font-size="10.5" fill="#191919">SP: split by sequence</text>

  <!-- connector down to row 2 -->
  <polyline points="599,200 599,250 100,250 100,318" fill="none" stroke="#191919" stroke-width="1.3" marker-end="url(#sparrow)"/>

  <!-- Row 2: MLP sublayer -->
  <text x="40" y="300" font-size="13" font-weight="600" fill="#191919">MLP sublayer</text>
  <rect x="40" y="320" width="120" height="60" rx="6" fill="#E3EBF2" stroke="#191919" stroke-width="1.2"/>
  <text x="100" y="345" text-anchor="middle" font-size="11.5" font-weight="600" fill="#191919">LayerNorm</text>
  <text x="100" y="362" text-anchor="middle" font-size="10.5" fill="#191919">SP: split by sequence</text>

  <line x1="160" y1="350" x2="230" y2="350" stroke="#191919" stroke-width="1.3" marker-end="url(#sparrow)"/>
  <text x="195" y="338" text-anchor="middle" font-size="9.5" fill="#6B6B6B">all-gather</text>

  <rect x="232" y="320" width="220" height="60" rx="6" fill="#D97757" stroke="#191919" stroke-width="1.2"/>
  <text x="342" y="345" text-anchor="middle" font-size="11.5" font-weight="600" fill="#F4F3EF">MLP</text>
  <text x="342" y="362" text-anchor="middle" font-size="10.5" fill="#F4F3EF">TP: split by columns/rows</text>

  <line x1="452" y1="350" x2="522" y2="350" stroke="#191919" stroke-width="1.3" marker-end="url(#sparrow)"/>
  <text x="487" y="338" text-anchor="middle" font-size="9.5" fill="#6B6B6B">reduce-scatter</text>

  <rect x="524" y="320" width="150" height="60" rx="6" fill="#E3EBF2" stroke="#191919" stroke-width="1.2"/>
  <text x="599" y="345" text-anchor="middle" font-size="11.5" font-weight="600" fill="#191919">Dropout + residual</text>
  <text x="599" y="362" text-anchor="middle" font-size="10.5" fill="#191919">SP: split by sequence</text>

  <text x="740" y="350" font-size="11.5" fill="#6B6B6B">→ next layer's</text>
  <text x="740" y="366" font-size="11.5" fill="#6B6B6B">LayerNorm (SP)</text>

  <!-- legend -->
  <g transform="translate(40,430)">
    <rect x="0" y="0" width="16" height="16" fill="#E3EBF2" stroke="#191919" stroke-width="0.8"/>
    <text x="22" y="13" font-size="12" fill="#191919">SP region — activations split along sequence, zero redundant storage</text>
    <rect x="0" y="28" width="16" height="16" fill="#D97757" stroke="#191919" stroke-width="0.8"/>
    <text x="22" y="41" font-size="12" fill="#191919">TP region — split along hidden dim, needs the full sequence to compute</text>
  </g>

  <text x="450" y="510" text-anchor="middle" font-size="13" font-weight="600" fill="#191919">total communication volume is the same as pure TP's all-reduce — this is a memory win, not a bandwidth win</text>
  <text x="450" y="532" text-anchor="middle" font-size="12" fill="#6B6B6B">all-gather + reduce-scatter together move exactly as many bytes as one all-reduce would</text>
</svg>
