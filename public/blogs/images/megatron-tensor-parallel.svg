<svg viewBox="0 0 960 700" xmlns="http://www.w3.org/2000/svg" font-family="Inter, -apple-system, sans-serif">
  <rect x="0" y="0" width="960" height="700" fill="#F4F3EF"/>
  <text x="480" y="38" text-anchor="middle" font-size="22" font-weight="600" fill="#191919">Tensor Parallelism: Splitting One Layer's Math</text>
  <text x="480" y="60" text-anchor="middle" font-size="13" fill="#6B6B6B">Megatron-LM's MLP block — column-parallel then row-parallel, one all-reduce ties them back together</text>

  <defs>
    <marker id="mparrow" markerWidth="9" markerHeight="9" refX="4.5" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#191919"/>
    </marker>
  </defs>

  <text x="260" y="96" text-anchor="middle" font-size="14" font-weight="600" fill="#191919">GPU 0</text>
  <text x="700" y="96" text-anchor="middle" font-size="14" font-weight="600" fill="#191919">GPU 1</text>

  <!-- Row: input -->
  <rect x="120" y="108" width="280" height="46" rx="6" fill="#E3EBF2" stroke="#191919" stroke-width="1.2"/>
  <text x="260" y="136" text-anchor="middle" font-size="12.5" fill="#191919">input X (identical copy)</text>
  <rect x="560" y="108" width="280" height="46" rx="6" fill="#E3EBF2" stroke="#191919" stroke-width="1.2"/>
  <text x="700" y="136" text-anchor="middle" font-size="12.5" fill="#191919">input X (identical copy)</text>

  <line x1="260" y1="154" x2="260" y2="184" stroke="#191919" stroke-width="1.3" marker-end="url(#mparrow)"/>
  <line x1="700" y1="154" x2="700" y2="184" stroke="#191919" stroke-width="1.3" marker-end="url(#mparrow)"/>

  <!-- Row: column-parallel linear A -->
  <rect x="120" y="188" width="280" height="56" rx="6" fill="#D97757" stroke="#191919" stroke-width="1.2"/>
  <text x="260" y="212" text-anchor="middle" font-size="12.5" font-weight="600" fill="#F4F3EF">Linear A₀ (column shard)</text>
  <text x="260" y="230" text-anchor="middle" font-size="11" fill="#F4F3EF">owns columns 0..k of weight A</text>
  <rect x="560" y="188" width="280" height="56" rx="6" fill="#D97757" stroke="#191919" stroke-width="1.2"/>
  <text x="700" y="212" text-anchor="middle" font-size="12.5" font-weight="600" fill="#F4F3EF">Linear A₁ (column shard)</text>
  <text x="700" y="230" text-anchor="middle" font-size="11" fill="#F4F3EF">owns columns k..2k of weight A</text>

  <line x1="260" y1="244" x2="260" y2="274" stroke="#191919" stroke-width="1.3" marker-end="url(#mparrow)"/>
  <line x1="700" y1="244" x2="700" y2="274" stroke="#191919" stroke-width="1.3" marker-end="url(#mparrow)"/>

  <!-- Row: GeLU -->
  <rect x="120" y="278" width="280" height="42" rx="6" fill="#F3ECE2" stroke="#191919" stroke-width="1.2"/>
  <text x="260" y="304" text-anchor="middle" font-size="12.5" fill="#191919">GeLU — local, no communication</text>
  <rect x="560" y="278" width="280" height="42" rx="6" fill="#F3ECE2" stroke="#191919" stroke-width="1.2"/>
  <text x="700" y="304" text-anchor="middle" font-size="12.5" fill="#191919">GeLU — local, no communication</text>

  <line x1="260" y1="320" x2="260" y2="350" stroke="#191919" stroke-width="1.3" marker-end="url(#mparrow)"/>
  <line x1="700" y1="320" x2="700" y2="350" stroke="#191919" stroke-width="1.3" marker-end="url(#mparrow)"/>

  <!-- Row: row-parallel linear B -->
  <rect x="120" y="354" width="280" height="56" rx="6" fill="#8DA399" stroke="#191919" stroke-width="1.2"/>
  <text x="260" y="378" text-anchor="middle" font-size="12.5" font-weight="600" fill="#F4F3EF">Linear B₀ (row shard)</text>
  <text x="260" y="396" text-anchor="middle" font-size="11" fill="#F4F3EF">produces partial output Y₀</text>
  <rect x="560" y="354" width="280" height="56" rx="6" fill="#8DA399" stroke="#191919" stroke-width="1.2"/>
  <text x="700" y="378" text-anchor="middle" font-size="12.5" font-weight="600" fill="#F4F3EF">Linear B₁ (row shard)</text>
  <text x="700" y="396" text-anchor="middle" font-size="11" fill="#F4F3EF">produces partial output Y₁</text>

  <line x1="260" y1="410" x2="260" y2="450" stroke="#191919" stroke-width="1.3" marker-end="url(#mparrow)"/>
  <line x1="700" y1="410" x2="700" y2="450" stroke="#191919" stroke-width="1.3" marker-end="url(#mparrow)"/>

  <!-- All-reduce merge -->
  <rect x="120" y="454" width="720" height="66" rx="8" fill="#191919" stroke="#191919" stroke-width="1.3"/>
  <text x="480" y="480" text-anchor="middle" font-size="13.5" font-weight="600" fill="#F4F3EF">all-reduce (the "g" operator): Y = Y₀ + Y₁</text>
  <text x="480" y="500" text-anchor="middle" font-size="11.5" fill="#F4F3EF">the one point of communication this block needs in the forward pass</text>

  <line x1="480" y1="520" x2="480" y2="550" stroke="#191919" stroke-width="1.3" marker-end="url(#mparrow)"/>

  <rect x="330" y="554" width="300" height="46" rx="6" fill="#E3EBF2" stroke="#191919" stroke-width="1.2"/>
  <text x="480" y="582" text-anchor="middle" font-size="12.5" fill="#191919">output Y — identical on both GPUs again</text>

  <text x="480" y="640" text-anchor="middle" font-size="13" fill="#191919" font-weight="600">attention heads split the same way: each GPU owns a subset of heads, all-reduce once at the block's end</text>
  <text x="480" y="662" text-anchor="middle" font-size="12" fill="#6B6B6B">a full transformer layer (attention + MLP) needs 2 all-reduces forward and 2 in backward — all on the fast NVLink domain</text>
</svg>
