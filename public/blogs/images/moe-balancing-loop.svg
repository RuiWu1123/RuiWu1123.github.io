<svg viewBox="0 0 1000 420" xmlns="http://www.w3.org/2000/svg" font-family="Inter, -apple-system, sans-serif">
  <rect x="0" y="0" width="1000" height="420" fill="#F4F3EF"/>
  <text x="500" y="36" text-anchor="middle" font-size="23" font-weight="600" fill="#191919">DeepSeek-V3's Bias-Based Balancing Loop</text>
  <text x="500" y="59" text-anchor="middle" font-size="14" fill="#6B6B6B">no extra loss term: the router corrects itself every step</text>

  <!-- 4 boxes in a cycle -->
  <rect x="60" y="100" width="230" height="94" rx="10" fill="#F3ECE2" stroke="#191919" stroke-width="1.2"/>
  <text x="175" y="132" text-anchor="middle" font-size="15" font-weight="600" fill="#191919">Route tokens</text>
  <text x="175" y="153" text-anchor="middle" font-size="12.5" fill="#6B6B6B">score = g_i + b_i</text>
  <text x="175" y="171" text-anchor="middle" font-size="12.5" fill="#6B6B6B">select top-K by score</text>

  <rect x="385" y="100" width="230" height="94" rx="10" fill="#F3ECE2" stroke="#191919" stroke-width="1.2"/>
  <text x="500" y="132" text-anchor="middle" font-size="15" font-weight="600" fill="#191919">Combine outputs</text>
  <text x="500" y="153" text-anchor="middle" font-size="12.5" fill="#6B6B6B">weight = g_i, bias excluded</text>
  <text x="500" y="171" text-anchor="middle" font-size="12.5" fill="#6B6B6B">bias never touches the output</text>

  <rect x="710" y="100" width="230" height="94" rx="10" fill="#F3ECE2" stroke="#191919" stroke-width="1.2"/>
  <text x="825" y="132" text-anchor="middle" font-size="15" font-weight="600" fill="#191919">Measure load</text>
  <text x="825" y="153" text-anchor="middle" font-size="12.5" fill="#6B6B6B">count tokens per expert</text>
  <text x="825" y="171" text-anchor="middle" font-size="12.5" fill="#6B6B6B">this step's batch</text>

  <rect x="385" y="280" width="230" height="94" rx="10" fill="#191919"/>
  <text x="500" y="312" text-anchor="middle" font-size="15" font-weight="600" fill="#F4F3EF">Update bias</text>
  <text x="500" y="333" text-anchor="middle" font-size="12.5" fill="#E6E4DD">overloaded: b_i −= γ</text>
  <text x="500" y="351" text-anchor="middle" font-size="12.5" fill="#E6E4DD">underloaded: b_i += γ</text>

  <!-- arrows: use small triangle polygons instead of markers -->
  <line x1="290" y1="140" x2="380" y2="140" stroke="#191919" stroke-opacity="0.5" stroke-width="1.6"/>
  <polygon points="380,140 366,133 366,147" fill="#191919" fill-opacity="0.6"/>

  <line x1="615" y1="140" x2="705" y2="140" stroke="#191919" stroke-opacity="0.5" stroke-width="1.6"/>
  <polygon points="705,140 691,133 691,147" fill="#191919" fill-opacity="0.6"/>

  <line x1="825" y1="194" x2="825" y2="260" stroke="#191919" stroke-opacity="0.5" stroke-width="1.6"/>
  <line x1="825" y1="260" x2="500" y2="260" stroke="#191919" stroke-opacity="0.5" stroke-width="1.6"/>
  <line x1="500" y1="260" x2="500" y2="274" stroke="#191919" stroke-opacity="0.5" stroke-width="1.6"/>
  <polygon points="500,280 493,267 507,267" fill="#191919" fill-opacity="0.6"/>

  <!-- loop back to routing -->
  <line x1="385" y1="327" x2="175" y2="327" stroke="#191919" stroke-opacity="0.5" stroke-width="1.6"/>
  <line x1="175" y1="327" x2="175" y2="198" stroke="#191919" stroke-opacity="0.5" stroke-width="1.6"/>
  <polygon points="175,198 168,211 182,211" fill="#191919" fill-opacity="0.6"/>
  <text x="270" y="345" text-anchor="middle" font-size="12.5" fill="#6B6B6B">next training step</text>

  <text x="500" y="400" text-anchor="middle" font-size="13" fill="#6B6B6B">a small extra sequence-wise loss (not shown) catches imbalance within one long sequence</text>
</svg>
