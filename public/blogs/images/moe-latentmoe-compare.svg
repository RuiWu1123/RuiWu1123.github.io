<svg viewBox="0 0 1120 230" xmlns="http://www.w3.org/2000/svg" font-family="Inter, -apple-system, sans-serif">
  <rect x="0" y="0" width="1120" height="230" fill="#F4F3EF"/>

  <text x="550" y="24" text-anchor="middle" font-size="16" font-weight="600" fill="#191919">LatentMoE</text>

  <!-- token -->
  <rect x="40" y="110" width="110" height="48" rx="8" fill="#191919"/>
  <text x="95" y="139" text-anchor="middle" font-size="14" fill="#F4F3EF">token x</text>

  <line x1="160" y1="134" x2="196" y2="134" stroke="#191919" stroke-opacity="0.4" stroke-width="1.6"/>
  <polygon points="210,134 196,124 196,144" fill="#191919" fill-opacity="0.4"/>

  <!-- down-project -->
  <rect x="210" y="100" width="170" height="68" rx="8" fill="#F3ECE2" stroke="#191919" stroke-width="1.2"/>
  <text x="295" y="130" text-anchor="middle" font-size="13.5" font-weight="600" fill="#191919">down-project</text>
  <text x="295" y="150" text-anchor="middle" font-size="11" fill="#6B6B6B">d → l</text>

  <line x1="390" y1="134" x2="426" y2="134" stroke="#191919" stroke-opacity="0.4" stroke-width="1.6"/>
  <polygon points="440,134 426,124 426,144" fill="#191919" fill-opacity="0.4"/>

  <!-- MoE core, compressed -->
  <rect x="440" y="80" width="220" height="108" rx="8" fill="#8DA399" fill-opacity="0.18" stroke="#8DA399" stroke-width="1.6" stroke-dasharray="5 4"/>
  <text x="550" y="130" text-anchor="middle" font-size="18" font-weight="600" fill="#191919">MoE</text>
  <text x="550" y="151" text-anchor="middle" font-size="11.5" fill="#6B6B6B">dim l</text>

  <line x1="670" y1="134" x2="706" y2="134" stroke="#191919" stroke-opacity="0.4" stroke-width="1.6"/>
  <polygon points="720,134 706,124 706,144" fill="#191919" fill-opacity="0.4"/>

  <!-- up-project -->
  <rect x="720" y="100" width="170" height="68" rx="8" fill="#F3ECE2" stroke="#191919" stroke-width="1.2"/>
  <text x="805" y="130" text-anchor="middle" font-size="13.5" font-weight="600" fill="#191919">up-project</text>
  <text x="805" y="150" text-anchor="middle" font-size="11" fill="#6B6B6B">l → d</text>

  <line x1="900" y1="134" x2="936" y2="134" stroke="#191919" stroke-opacity="0.4" stroke-width="1.6"/>
  <polygon points="950,134 936,124 936,144" fill="#191919" fill-opacity="0.4"/>

  <!-- output -->
  <rect x="950" y="110" width="110" height="48" rx="8" fill="#191919"/>
  <text x="1005" y="139" text-anchor="middle" font-size="14" fill="#F4F3EF">output y</text>
</svg>
