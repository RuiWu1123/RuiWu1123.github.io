<svg viewBox="0.0 0.0 1484.8 537.6" xmlns="http://www.w3.org/2000/svg" font-family="Inter, -apple-system, sans-serif">
  <rect x="0.0" y="0.0" width="1484.8" height="537.6" fill="#F4F3EF"/>
  <text x="742.4" y="43.5" text-anchor="middle" font-size="24.4" font-weight="600" fill="#191919">LatentMoE: Compress, Compute, Expand</text>
  <text x="742.4" y="70.4" text-anchor="middle" font-size="15.2" fill="#6B6B6B">shrinking the dimension the expert and the network both have to deal with</text>

  <!-- Panel 1: standard MoE -->
  <g>
    <rect x="51.2" y="102.4" width="640.0" height="396.8" rx="12.8" fill="#FFFFFF" stroke="#191919" stroke-opacity="0.2" stroke-width="1.5"/>
    <text x="371.2" y="138.2" text-anchor="middle" font-size="16.5" font-weight="600" fill="#191919">Standard MoE</text>
    <text x="371.2" y="161.3" text-anchor="middle" font-size="12.2" fill="#6B6B6B">expert compute and all-to-all both run at dim d</text>

    <rect x="89.6" y="204.8" width="115.2" height="64.0" rx="10.2" fill="#F3ECE2" stroke="#191919" stroke-width="1.5"/>
    <text x="147.2" y="243.2" text-anchor="middle" font-size="13.4" fill="#191919">token (d)</text>

    <line x1="204.8" y1="236.8" x2="294.4" y2="236.8" stroke="#191919" stroke-opacity="0.6" stroke-width="1.8"/>
    <polygon points="294.4,236.8 279.0,229.1 279.0,244.5" fill="#191919" fill-opacity="0.8"/>
    <text x="249.6" y="220.2" text-anchor="middle" font-size="11.0" fill="#6B6B6B">all-to-all</text>
    <text x="249.6" y="265.0" text-anchor="middle" font-size="11.0" fill="#6B6B6B">payload: d</text>

    <rect x="300.8" y="204.8" width="115.2" height="64.0" rx="10.2" fill="#D97757" stroke="#191919" stroke-width="1.5"/>
    <text x="358.4" y="243.2" text-anchor="middle" font-size="13.4" fill="#191919">expert FFN (d)</text>

    <line x1="416.0" y1="236.8" x2="505.6" y2="236.8" stroke="#191919" stroke-opacity="0.6" stroke-width="1.8"/>
    <polygon points="505.6,236.8 490.2,229.1 490.2,244.5" fill="#191919" fill-opacity="0.8"/>

    <rect x="512.0" y="204.8" width="140.8" height="64.0" rx="10.2" fill="#F3ECE2" stroke="#191919" stroke-width="1.5"/>
    <text x="582.4" y="243.2" text-anchor="middle" font-size="13.4" fill="#191919">output (d)</text>

    <text x="371.2" y="326.4" text-anchor="middle" font-size="12.8" fill="#191919" font-weight="600">cost of N experts, top-K ∝ N · d, K · d</text>
    <text x="371.2" y="349.4" text-anchor="middle" font-size="11.6" fill="#6B6B6B">bigger N or K costs communication and</text>
    <text x="371.2" y="368.6" text-anchor="middle" font-size="11.6" fill="#6B6B6B">compute linearly — this is what limits pool size</text>

    <text x="371.2" y="422.4" text-anchor="middle" font-size="12.2" fill="#6B6B6B">e.g. DeepSeek-V3: d full width, 256 experts, top-8</text>
  </g>

  <!-- Panel 2: LatentMoE -->
  <g>
    <rect x="742.4" y="102.4" width="691.2" height="396.8" rx="12.8" fill="#FFFFFF" stroke="#191919" stroke-opacity="0.2" stroke-width="1.5"/>
    <text x="1088.0" y="138.2" text-anchor="middle" font-size="16.5" font-weight="600" fill="#191919">LatentMoE</text>
    <text x="1088.0" y="161.3" text-anchor="middle" font-size="12.2" fill="#6B6B6B">z = W_down · x  (dim l &lt; d)  →  expert(z)  →  W_up · expert(z)</text>

    <rect x="780.8" y="204.8" width="102.4" height="64.0" rx="10.2" fill="#F3ECE2" stroke="#191919" stroke-width="1.5"/>
    <text x="832.0" y="243.2" text-anchor="middle" font-size="12.8" fill="#191919">token (d)</text>

    <line x1="883.2" y1="236.8" x2="947.2" y2="236.8" stroke="#191919" stroke-opacity="0.6" stroke-width="1.8"/>
    <polygon points="947.2,236.8 931.8,229.1 931.8,244.5" fill="#191919" fill-opacity="0.8"/>
    <text x="915.2" y="220.2" text-anchor="middle" font-size="10.4" fill="#6B6B6B">down-proj</text>

    <rect x="953.6" y="215.0" width="89.6" height="43.5" rx="7.7" fill="#F3ECE2" stroke="#191919" stroke-width="1.5"/>
    <text x="998.4" y="241.9" text-anchor="middle" font-size="12.2" fill="#191919">z (l)</text>

    <line x1="1043.2" y1="236.8" x2="1094.4" y2="236.8" stroke="#191919" stroke-opacity="0.6" stroke-width="1.8"/>
    <polygon points="1094.4,236.8 1079.0,229.1 1079.0,244.5" fill="#191919" fill-opacity="0.8"/>
    <text x="1068.8" y="220.2" text-anchor="middle" font-size="9.8" fill="#6B6B6B">a2a: l</text>

    <rect x="1100.8" y="215.0" width="89.6" height="43.5" rx="7.7" fill="#D97757" stroke="#191919" stroke-width="1.5"/>
    <text x="1145.6" y="241.9" text-anchor="middle" font-size="12.2" fill="#191919">FFN (l)</text>

    <line x1="1190.4" y1="236.8" x2="1241.6" y2="236.8" stroke="#191919" stroke-opacity="0.6" stroke-width="1.8"/>
    <polygon points="1241.6,236.8 1226.2,229.1 1226.2,244.5" fill="#191919" fill-opacity="0.8"/>
    <text x="1216.0" y="220.2" text-anchor="middle" font-size="10.4" fill="#6B6B6B">up-proj</text>

    <rect x="1248.0" y="204.8" width="102.4" height="64.0" rx="10.2" fill="#F3ECE2" stroke="#191919" stroke-width="1.5"/>
    <text x="1299.2" y="243.2" text-anchor="middle" font-size="12.8" fill="#191919">output (d)</text>

    <text x="1088.0" y="326.4" text-anchor="middle" font-size="12.8" fill="#191919" font-weight="600">cost of N experts, top-K ∝ N · l, K · l  (l &lt; d)</text>
    <text x="1088.0" y="349.4" text-anchor="middle" font-size="11.6" fill="#6B6B6B">the saved (d − l) budget buys a bigger N and K</text>
    <text x="1088.0" y="368.6" text-anchor="middle" font-size="11.6" fill="#6B6B6B">at the same total compute and communication cost</text>

    <text x="1088.0" y="422.4" text-anchor="middle" font-size="12.2" fill="#6B6B6B">MAI-Thinking-1: 192→512 experts, top-4→top-8, once affordable</text>
    <text x="1088.0" y="445.4" text-anchor="middle" font-size="12.2" fill="#6B6B6B">Kimi K3's "Stable LatentMoE": same idea, more extreme (896, top-16)</text>
  </g>
</svg>
