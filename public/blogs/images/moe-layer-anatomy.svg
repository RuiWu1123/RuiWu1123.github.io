<svg viewBox="0 0 900 510" xmlns="http://www.w3.org/2000/svg" font-family="Inter, -apple-system, sans-serif">
  <rect x="0" y="0" width="900" height="510" fill="#F4F3EF"/>
  <text x="450" y="38" text-anchor="middle" font-size="24" font-weight="600" fill="#191919">Anatomy of a Modern MoE Layer</text>
  <text x="450" y="61" text-anchor="middle" font-size="14" fill="#6B6B6B">one token, one layer: every routed expert is a candidate, only a handful actually run</text>

  <!-- input token -->
  <rect x="400" y="86" width="100" height="42" rx="8" fill="#191919"/>
  <text x="450" y="112" text-anchor="middle" font-size="14" fill="#F4F3EF">token x</text>

  <!-- split down to router and shared expert -->
  <line x1="450" y1="128" x2="450" y2="152" stroke="#191919" stroke-opacity="0.4" stroke-width="1.6"/>
  <line x1="450" y1="152" x2="330" y2="152" stroke="#191919" stroke-opacity="0.4" stroke-width="1.6"/>
  <line x1="450" y1="152" x2="570" y2="152" stroke="#191919" stroke-opacity="0.4" stroke-width="1.6"/>
  <line x1="330" y1="152" x2="330" y2="178" stroke="#191919" stroke-opacity="0.4" stroke-width="1.6"/>
  <polygon points="330,178 324,167 336,167" fill="#191919" fill-opacity="0.4"/>
  <line x1="570" y1="152" x2="570" y2="178" stroke="#191919" stroke-opacity="0.4" stroke-width="1.6"/>
  <polygon points="570,178 564,167 576,167" fill="#191919" fill-opacity="0.4"/>

  <!-- router -->
  <rect x="260" y="178" width="140" height="48" rx="8" fill="#F3ECE2" stroke="#191919" stroke-width="1.2"/>
  <text x="330" y="200" text-anchor="middle" font-size="14" font-weight="600" fill="#191919">router</text>
  <text x="330" y="216" text-anchor="middle" font-size="11.5" fill="#6B6B6B">affinity scores, top-k</text>

  <!-- shared expert, always on -->
  <rect x="500" y="178" width="140" height="48" rx="8" fill="#8DA399" stroke="#191919" stroke-width="1.2"/>
  <text x="570" y="200" text-anchor="middle" font-size="14" font-weight="600" fill="#F4F3EF">shared expert</text>
  <text x="570" y="216" text-anchor="middle" font-size="11.5" fill="#F4F3EF">always active</text>

  <!-- router fans down to expert pool -->
  <line x1="330" y1="226" x2="330" y2="252" stroke="#191919" stroke-opacity="0.35" stroke-width="1.2"/>

  <text x="450" y="248" text-anchor="middle" font-size="12" fill="#6B6B6B">hundreds more routed experts, most idle for this token</text>

  <!-- expert pool: 7 boxes across the full width, 2 selected -->
  <g stroke="#191919" stroke-width="1" fill="#FFFFFF" fill-opacity="0.4">
    <rect x="40" y="262" width="100" height="50" rx="6"/>
    <rect x="160" y="262" width="100" height="50" rx="6"/>
    <rect x="400" y="262" width="100" height="50" rx="6"/>
    <rect x="520" y="262" width="100" height="50" rx="6"/>
    <rect x="760" y="262" width="100" height="50" rx="6"/>
  </g>
  <text x="90" y="291" text-anchor="middle" font-size="11.5" fill="#6B6B6B">E1</text>
  <text x="210" y="291" text-anchor="middle" font-size="11.5" fill="#6B6B6B">E2</text>
  <text x="450" y="291" text-anchor="middle" font-size="11.5" fill="#6B6B6B">E4</text>
  <text x="570" y="291" text-anchor="middle" font-size="11.5" fill="#6B6B6B">E5</text>
  <text x="810" y="291" text-anchor="middle" font-size="11.5" fill="#6B6B6B">E7</text>

  <!-- selected experts, highlighted -->
  <rect x="280" y="262" width="100" height="50" rx="6" fill="#D97757" stroke="#191919" stroke-width="1.6"/>
  <text x="330" y="291" text-anchor="middle" font-size="11.5" fill="#F4F3EF">E3</text>
  <rect x="640" y="262" width="100" height="50" rx="6" fill="#D97757" stroke="#191919" stroke-width="1.6"/>
  <text x="690" y="291" text-anchor="middle" font-size="11.5" fill="#F4F3EF">E6</text>

  <!-- lines from selected experts down to combine -->
  <line x1="330" y1="312" x2="330" y2="346" stroke="#191919" stroke-width="1.6"/>
  <line x1="330" y1="346" x2="450" y2="346" stroke="#191919" stroke-width="1.6"/>
  <line x1="690" y1="312" x2="690" y2="346" stroke="#191919" stroke-width="1.6"/>
  <line x1="690" y1="346" x2="450" y2="346" stroke="#191919" stroke-width="1.6"/>
  <line x1="450" y1="346" x2="450" y2="372" stroke="#191919" stroke-width="1.6"/>

  <!-- shared expert down to combine -->
  <line x1="570" y1="226" x2="570" y2="346" stroke="#191919" stroke-width="1.6"/>
  <line x1="570" y1="346" x2="470" y2="346" stroke="#191919" stroke-width="1.6"/>

  <polygon points="450,378 442,364 458,364" fill="#191919"/>

  <!-- combine box -->
  <rect x="370" y="382" width="160" height="48" rx="8" fill="#E3EBF2" stroke="#191919" stroke-width="1.2"/>
  <text x="450" y="404" text-anchor="middle" font-size="14" font-weight="600" fill="#191919">weighted combine</text>
  <text x="450" y="420" text-anchor="middle" font-size="11.5" fill="#6B6B6B">shared + top-k routed</text>

  <line x1="450" y1="430" x2="450" y2="456" stroke="#191919" stroke-width="1.6"/>
  <polygon points="450,462 442,450 458,450" fill="#191919"/>

  <!-- output token -->
  <rect x="400" y="466" width="100" height="42" rx="8" fill="#191919"/>
  <text x="450" y="492" text-anchor="middle" font-size="14" fill="#F4F3EF">output y</text>
</svg>
