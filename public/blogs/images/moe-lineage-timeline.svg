<svg viewBox="0 0 1200 260" xmlns="http://www.w3.org/2000/svg" font-family="Inter, -apple-system, sans-serif">
  <rect x="0" y="0" width="1200" height="260" fill="#F4F3EF"/>
  <text x="600" y="34" text-anchor="middle" font-size="20" font-weight="600" fill="#191919">Nine Years of MoE Design</text>
  <text x="600" y="55" text-anchor="middle" font-size="12.5" fill="#6B6B6B">one continuous line, from a 1991 idea to 2026's frontier reports</text>

  <line x1="70" y1="140" x2="1130" y2="140" stroke="#191919" stroke-opacity="0.3" stroke-width="1.4"/>

  <!-- 1991 precursor: muted, dashed -->
  <circle cx="70" cy="140" r="6" fill="none" stroke="#6B6B6B" stroke-width="1.4" stroke-dasharray="2 2"/>
  <text x="70" y="112" text-anchor="middle" font-size="10.5" fill="#6B6B6B">Jacobs et al.</text>
  <text x="70" y="164" text-anchor="middle" font-size="9.5" fill="#6B6B6B">1991</text>
  <text x="70" y="177" text-anchor="middle" font-size="9.5" fill="#6B6B6B">pre-deep-learning idea</text>

  <circle cx="205" cy="140" r="6" fill="#6B6B6B"/>
  <text x="205" y="112" text-anchor="middle" font-size="10.5" fill="#191919">Shazeer et al.</text>
  <text x="205" y="164" text-anchor="middle" font-size="9.5" fill="#6B6B6B">2017</text>
  <text x="205" y="177" text-anchor="middle" font-size="9.5" fill="#6B6B6B">sparse top-k for deep nets</text>

  <circle cx="340" cy="140" r="6" fill="#6B6B6B"/>
  <text x="340" y="112" text-anchor="middle" font-size="10.5" fill="#191919">GShard</text>
  <text x="340" y="164" text-anchor="middle" font-size="9.5" fill="#6B6B6B">2020</text>
  <text x="340" y="177" text-anchor="middle" font-size="9.5" fill="#6B6B6B">expert parallelism</text>

  <circle cx="475" cy="140" r="6" fill="#6B6B6B"/>
  <text x="475" y="112" text-anchor="middle" font-size="10.5" fill="#191919">Switch / GLaM</text>
  <text x="475" y="164" text-anchor="middle" font-size="9.5" fill="#6B6B6B">2021</text>
  <text x="475" y="177" text-anchor="middle" font-size="9.5" fill="#6B6B6B">trillion-scale routing</text>

  <circle cx="610" cy="140" r="6" fill="#6B6B6B"/>
  <text x="610" y="112" text-anchor="middle" font-size="10.5" fill="#191919">ST-MoE / Expert Choice</text>
  <text x="610" y="164" text-anchor="middle" font-size="9.5" fill="#6B6B6B">2022</text>
  <text x="610" y="177" text-anchor="middle" font-size="9.5" fill="#6B6B6B">stability &amp; routing</text>

  <circle cx="745" cy="140" r="6" fill="#6B6B6B"/>
  <text x="745" y="112" text-anchor="middle" font-size="10.5" fill="#191919">Mixtral</text>
  <text x="745" y="164" text-anchor="middle" font-size="9.5" fill="#6B6B6B">2024</text>
  <text x="745" y="177" text-anchor="middle" font-size="9.5" fill="#6B6B6B">open-source MoE</text>

  <!-- DeepSeekMoE: the fork, highlighted -->
  <circle cx="890" cy="140" r="9" fill="#D97757" stroke="#191919" stroke-width="1.2"/>
  <text x="890" y="108" text-anchor="middle" font-size="11.5" font-weight="600" fill="#191919">DeepSeekMoE</text>
  <text x="890" y="167" text-anchor="middle" font-size="10" font-weight="600" fill="#191919">2024 · the fork</text>
  <text x="890" y="180" text-anchor="middle" font-size="9.5" fill="#6B6B6B">fine-grained + shared expert</text>

  <!-- DeepSeek-V3: the breakout, highlighted larger -->
  <circle cx="1030" cy="140" r="10" fill="#191919"/>
  <text x="1030" y="106" text-anchor="middle" font-size="12" font-weight="600" fill="#191919">DeepSeek-V3</text>
  <text x="1030" y="167" text-anchor="middle" font-size="10" font-weight="600" fill="#191919">late 2024 · the breakout</text>
  <text x="1030" y="180" text-anchor="middle" font-size="9.5" fill="#6B6B6B">section 3 covers this in depth</text>

  <!-- 2026 bracket pointing forward -->
  <line x1="1130" y1="140" x2="1170" y2="140" stroke="#191919" stroke-opacity="0.3" stroke-width="1.4" stroke-dasharray="3 3"/>
  <text x="1150" y="112" text-anchor="middle" font-size="10" fill="#6B6B6B">2026 →</text>
  <text x="1150" y="200" text-anchor="middle" font-size="9.5" fill="#6B6B6B">six frontier</text>
  <text x="1150" y="212" text-anchor="middle" font-size="9.5" fill="#6B6B6B">reports</text>
  <text x="1150" y="224" text-anchor="middle" font-size="9.5" fill="#6B6B6B">(section 11)</text>
</svg>
