<svg viewBox="0 0 1200 400" xmlns="http://www.w3.org/2000/svg" font-family="Inter, -apple-system, sans-serif">
  <rect x="0" y="0" width="1200" height="400" fill="#F4F3EF"/>
  <text x="600" y="34" text-anchor="middle" font-size="27" font-weight="600" fill="#191919">Nine Years of MoE Design</text>

  <!-- all connecting lines drawn first so text always sits on top -->
  <line x1="90" y1="128" x2="1110" y2="128" stroke="#191919" stroke-opacity="0.3" stroke-width="1.8"/>
  <line x1="1110" y1="139" x2="1110" y2="250" stroke="#191919" stroke-opacity="0.3" stroke-width="1.8"/>
  <polygon points="1110,289 1102,278 1118,278" fill="#191919" fill-opacity="0.4"/>
  <line x1="1110" y1="298" x2="240" y2="298" stroke="#191919" stroke-opacity="0.3" stroke-width="1.8"/>
  <line x1="240" y1="298" x2="140" y2="298" stroke="#191919" stroke-opacity="0.3" stroke-width="1.8" stroke-dasharray="3 4"/>

  <!-- Row 1 nodes: left to right -->
  <circle cx="90" cy="128" r="9" fill="none" stroke="#6B6B6B" stroke-width="2" stroke-dasharray="2 4"/>
  <circle cx="345" cy="128" r="9" fill="#6B6B6B"/>
  <circle cx="600" cy="128" r="9" fill="#6B6B6B"/>
  <circle cx="855" cy="128" r="9" fill="#6B6B6B"/>
  <circle cx="1110" cy="128" r="9" fill="#6B6B6B"/>

  <!-- Row 2 nodes: right to left -->
  <circle cx="1110" cy="298" r="9" fill="#6B6B6B"/>
  <circle cx="810" cy="298" r="13" fill="#D97757" stroke="#191919" stroke-width="1.6"/>
  <circle cx="510" cy="298" r="14" fill="#191919"/>
  <rect x="60" y="266" width="160" height="64" rx="10" fill="#F4F3EF" stroke="#191919" stroke-opacity="0.5" stroke-width="1.6" stroke-dasharray="3 4"/>

  <!-- Row 1 labels -->
  <text x="90" y="90" text-anchor="middle" font-size="15" fill="#6B6B6B">Jacobs et al.</text>
  <text x="90" y="154" text-anchor="middle" font-size="13.5" fill="#6B6B6B">1991</text>
  <text x="90" y="173" text-anchor="middle" font-size="12.5" fill="#6B6B6B">pre-deep-learning idea</text>

  <text x="345" y="90" text-anchor="middle" font-size="15" fill="#191919">Shazeer et al.</text>
  <text x="345" y="154" text-anchor="middle" font-size="13.5" fill="#6B6B6B">2017</text>
  <text x="345" y="173" text-anchor="middle" font-size="12.5" fill="#6B6B6B">sparse top-k for deep nets</text>

  <text x="600" y="90" text-anchor="middle" font-size="15" fill="#191919">GShard</text>
  <text x="600" y="154" text-anchor="middle" font-size="13.5" fill="#6B6B6B">2020</text>
  <text x="600" y="173" text-anchor="middle" font-size="12.5" fill="#6B6B6B">expert parallelism</text>

  <text x="855" y="90" text-anchor="middle" font-size="15" fill="#191919">Switch / GLaM</text>
  <text x="855" y="154" text-anchor="middle" font-size="13.5" fill="#6B6B6B">2021</text>
  <text x="855" y="173" text-anchor="middle" font-size="12.5" fill="#6B6B6B">trillion-scale routing</text>

  <text x="1110" y="90" text-anchor="middle" font-size="15" fill="#191919">ST-MoE / Expert Choice</text>
  <text x="1110" y="154" text-anchor="middle" font-size="13.5" fill="#6B6B6B">2022</text>
  <text x="1110" y="173" text-anchor="middle" font-size="12.5" fill="#6B6B6B">stability &amp; routing</text>

  <!-- Row 2 labels -->
  <text x="1110" y="266" text-anchor="middle" font-size="15" fill="#191919">Mixtral</text>
  <text x="1110" y="330" text-anchor="middle" font-size="13.5" fill="#6B6B6B">2024</text>
  <text x="1110" y="349" text-anchor="middle" font-size="12.5" fill="#6B6B6B">open-source MoE</text>

  <text x="810" y="264" text-anchor="middle" font-size="16.5" font-weight="600" fill="#191919">DeepSeekMoE</text>
  <text x="810" y="330" text-anchor="middle" font-size="14" font-weight="600" fill="#191919">2024 · the fork</text>
  <text x="810" y="349" text-anchor="middle" font-size="12.5" fill="#6B6B6B">fine-grained + shared expert</text>

  <text x="510" y="264" text-anchor="middle" font-size="16.5" font-weight="600" fill="#191919">DeepSeek-V3</text>
  <text x="510" y="330" text-anchor="middle" font-size="14" font-weight="600" fill="#191919">late 2024 · the breakout</text>
  <text x="510" y="349" text-anchor="middle" font-size="12.5" fill="#6B6B6B">section 3 covers this in depth</text>

  <!-- terminal: 2026 marker -->
  <text x="140" y="291" text-anchor="middle" font-size="15" font-weight="600" fill="#191919">2026 →</text>
  <text x="140" y="309" text-anchor="middle" font-size="12.5" fill="#6B6B6B">six frontier reports</text>
  <text x="140" y="324" text-anchor="middle" font-size="12.5" fill="#6B6B6B">(section 11)</text>
</svg>
