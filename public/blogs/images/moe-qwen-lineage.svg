<svg viewBox="0 0 1000 300" xmlns="http://www.w3.org/2000/svg" font-family="Inter, -apple-system, sans-serif">
  <rect x="0" y="0" width="1000" height="300" fill="#F4F3EF"/>
  <text x="500" y="34" text-anchor="middle" font-size="20" font-weight="600" fill="#191919">Qwen's Shared-Expert Reversal</text>
  <text x="500" y="56" text-anchor="middle" font-size="12.5" fill="#6B6B6B">same lineage, opposite conclusion, then a partial walk-back</text>

  <line x1="110" y1="150" x2="890" y2="150" stroke="#191919" stroke-opacity="0.3" stroke-width="1.4"/>

  <!-- Qwen1.5-MoE -->
  <circle cx="110" cy="150" r="7" fill="#6B6B6B"/>
  <text x="110" y="122" text-anchor="middle" font-size="12" font-weight="600" fill="#191919">Qwen1.5-MoE</text>
  <text x="110" y="178" text-anchor="middle" font-size="10.5" fill="#6B6B6B">2024-03</text>
  <text x="110" y="193" text-anchor="middle" font-size="10.5" fill="#6B6B6B">4 shared + 60 routed</text>
  <text x="110" y="207" text-anchor="middle" font-size="10.5" fill="#6B6B6B">top-4</text>

  <!-- Qwen2-MoE -->
  <circle cx="380" cy="150" r="7" fill="#6B6B6B"/>
  <text x="380" y="122" text-anchor="middle" font-size="12" font-weight="600" fill="#191919">Qwen2-MoE</text>
  <text x="380" y="178" text-anchor="middle" font-size="10.5" fill="#6B6B6B">2024-06</text>
  <text x="380" y="193" text-anchor="middle" font-size="10.5" fill="#6B6B6B">8 shared + 64 routed</text>
  <text x="380" y="207" text-anchor="middle" font-size="10.5" fill="#6B6B6B">top-8, softmax gate</text>

  <!-- Qwen3-MoE, highlighted -->
  <circle cx="650" cy="150" r="10" fill="#D97757" stroke="#191919" stroke-width="1.2"/>
  <text x="650" y="118" text-anchor="middle" font-size="13" font-weight="600" fill="#191919">Qwen3-MoE</text>
  <text x="650" y="180" text-anchor="middle" font-size="10.5" font-weight="600" fill="#191919">2025-05</text>
  <text x="650" y="195" text-anchor="middle" font-size="10.5" font-weight="600" fill="#191919">128 experts, top-8</text>
  <text x="650" y="209" text-anchor="middle" font-size="10.5" font-weight="600" fill="#191919">no shared expert</text>
  <text x="650" y="223" text-anchor="middle" font-size="10.5" font-weight="600" fill="#191919">+ global-batch balancing</text>

  <!-- Qwen3-Next, dashed / secondary -->
  <line x1="700" y1="150" x2="850" y2="150" stroke="#191919" stroke-opacity="0.3" stroke-width="1.2" stroke-dasharray="3 3"/>
  <rect x="800" y="128" width="150" height="70" rx="8" fill="none" stroke="#191919" stroke-opacity="0.5" stroke-width="1.2" stroke-dasharray="3 3"/>
  <text x="875" y="150" text-anchor="middle" font-size="11.5" font-weight="600" fill="#191919">Qwen3-Next</text>
  <text x="875" y="165" text-anchor="middle" font-size="9.5" fill="#6B6B6B">2025-09 · secondary-sourced</text>
  <text x="875" y="179" text-anchor="middle" font-size="9.5" fill="#6B6B6B">512 experts, 10 routed</text>
  <text x="875" y="191" text-anchor="middle" font-size="9.5" fill="#6B6B6B">+1 shared expert returns</text>

  <line x1="45" y1="260" x2="75" y2="260" stroke="#191919" stroke-opacity="0.45" stroke-width="1.4"/>
  <text x="83" y="264" font-size="10" fill="#6B6B6B">confirmed in the model's own technical report</text>
  <line x1="380" y1="278" x2="410" y2="278" stroke="#191919" stroke-opacity="0.5" stroke-width="1.2" stroke-dasharray="3 3"/>
  <text x="418" y="282" font-size="10" fill="#6B6B6B">reported by secondary sources only, unconfirmed in a primary report</text>
</svg>
