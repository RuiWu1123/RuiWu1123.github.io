<svg viewBox="0 0 1160 400" xmlns="http://www.w3.org/2000/svg" font-family="Inter, -apple-system, sans-serif">
  <rect x="0" y="0" width="1160" height="400" fill="#F4F3EF"/>
  <text x="580" y="34" text-anchor="middle" font-size="20" font-weight="600" fill="#191919">Three Ways to Assign Tokens to Experts</text>
  <text x="580" y="55" text-anchor="middle" font-size="12.5" fill="#6B6B6B">same 8 tokens, same 4 experts — a different rule for who goes where</text>

  <!-- Panel 1: Hash -->
  <g>
    <rect x="30" y="80" width="340" height="300" rx="10" fill="#FFFFFF" stroke="#191919" stroke-opacity="0.12" stroke-width="1.2"/>
    <text x="200" y="108" text-anchor="middle" font-size="13.5" font-weight="600" fill="#191919">Hash routing</text>
    <text x="200" y="126" text-anchor="middle" font-size="10" fill="#6B6B6B">hash(token id) mod N</text>

    <!-- tokens row -->
    <g font-size="9">
      <!-- 8 tokens, alternating colors just to show content, but routing ignores it -->
      <circle cx="70" cy="160" r="8" fill="#D97757"/>
      <circle cx="110" cy="160" r="8" fill="#6B6B6B"/>
      <circle cx="150" cy="160" r="8" fill="#D97757"/>
      <circle cx="190" cy="160" r="8" fill="#6B6B6B"/>
      <circle cx="230" cy="160" r="8" fill="#D97757"/>
      <circle cx="270" cy="160" r="8" fill="#6B6B6B"/>
      <circle cx="310" cy="160" r="8" fill="#D97757"/>
      <circle cx="350" cy="160" r="8" fill="#6B6B6B"/>
    </g>
    <text x="200" y="184" text-anchor="middle" font-size="9" fill="#6B6B6B">orange = code tokens · gray = text tokens</text>

    <!-- experts row -->
    <rect x="55" y="290" width="60" height="40" rx="6" fill="#F3ECE2" stroke="#191919" stroke-width="1"/>
    <rect x="140" y="290" width="60" height="40" rx="6" fill="#F3ECE2" stroke="#191919" stroke-width="1"/>
    <rect x="225" y="290" width="60" height="40" rx="6" fill="#F3ECE2" stroke="#191919" stroke-width="1"/>
    <rect x="310" y="290" width="60" height="40" rx="6" fill="#F3ECE2" stroke="#191919" stroke-width="1"/>
    <text x="85" y="314" text-anchor="middle" font-size="10.5" fill="#191919">E1</text>
    <text x="170" y="314" text-anchor="middle" font-size="10.5" fill="#191919">E2</text>
    <text x="255" y="314" text-anchor="middle" font-size="10.5" fill="#191919">E3</text>
    <text x="340" y="314" text-anchor="middle" font-size="10.5" fill="#191919">E4</text>

    <!-- fixed round robin connections, uniform gray -->
    <g stroke="#191919" stroke-opacity="0.35" stroke-width="1">
      <line x1="70" y1="168" x2="85" y2="290"/>
      <line x1="110" y1="168" x2="170" y2="290"/>
      <line x1="150" y1="168" x2="255" y2="290"/>
      <line x1="190" y1="168" x2="340" y2="290"/>
      <line x1="230" y1="168" x2="85" y2="290"/>
      <line x1="270" y1="168" x2="170" y2="290"/>
      <line x1="310" y1="168" x2="255" y2="290"/>
      <line x1="350" y1="168" x2="340" y2="290"/>
    </g>
    <text x="200" y="356" text-anchor="middle" font-size="10.5" fill="#191919" font-weight="600">2 tokens / expert, always</text>
    <text x="200" y="371" text-anchor="middle" font-size="9.5" fill="#6B6B6B">perfect balance, zero content awareness</text>
  </g>

  <!-- Panel 2: Learned -->
  <g>
    <rect x="410" y="80" width="340" height="300" rx="10" fill="#FFFFFF" stroke="#191919" stroke-opacity="0.12" stroke-width="1.2"/>
    <text x="580" y="108" text-anchor="middle" font-size="13.5" font-weight="600" fill="#191919">Learned routing</text>
    <text x="580" y="126" text-anchor="middle" font-size="10" fill="#6B6B6B">gradient-trained gate scores each expert</text>

    <g font-size="9">
      <circle cx="450" cy="160" r="8" fill="#D97757"/>
      <circle cx="490" cy="160" r="8" fill="#D97757"/>
      <circle cx="530" cy="160" r="8" fill="#D97757"/>
      <circle cx="570" cy="160" r="8" fill="#D97757"/>
      <circle cx="610" cy="160" r="8" fill="#D97757"/>
      <circle cx="650" cy="160" r="8" fill="#6B6B6B"/>
      <circle cx="690" cy="160" r="8" fill="#6B6B6B"/>
      <circle cx="730" cy="160" r="8" fill="#6B6B6B"/>
    </g>
    <text x="580" y="184" text-anchor="middle" font-size="9" fill="#6B6B6B">orange = code tokens · gray = text tokens</text>

    <rect x="435" y="290" width="60" height="40" rx="6" fill="#F3ECE2" stroke="#191919" stroke-width="1"/>
    <rect x="520" y="290" width="60" height="40" rx="6" fill="#F3ECE2" stroke="#191919" stroke-width="1"/>
    <rect x="605" y="290" width="60" height="40" rx="6" fill="#F3ECE2" stroke="#191919" stroke-width="1"/>
    <rect x="690" y="290" width="60" height="40" rx="6" fill="none" stroke="#191919" stroke-width="1" stroke-dasharray="3 3"/>
    <text x="465" y="314" text-anchor="middle" font-size="10.5" fill="#191919">E1</text>
    <text x="550" y="314" text-anchor="middle" font-size="10.5" fill="#191919">E2</text>
    <text x="635" y="314" text-anchor="middle" font-size="10.5" fill="#191919">E3</text>
    <text x="720" y="314" text-anchor="middle" font-size="10.5" fill="#6B6B6B">E4</text>

    <!-- content-driven, clustered, uneven — E4 idle -->
    <g stroke="#D97757" stroke-opacity="0.55" stroke-width="1">
      <line x1="450" y1="168" x2="465" y2="290"/>
      <line x1="490" y1="168" x2="465" y2="290"/>
      <line x1="530" y1="168" x2="550" y2="290"/>
      <line x1="570" y1="168" x2="550" y2="290"/>
      <line x1="610" y1="168" x2="550" y2="290"/>
    </g>
    <g stroke="#6B6B6B" stroke-opacity="0.55" stroke-width="1">
      <line x1="650" y1="168" x2="635" y2="290"/>
      <line x1="690" y1="168" x2="635" y2="290"/>
      <line x1="730" y1="168" x2="635" y2="290"/>
    </g>
    <text x="580" y="356" text-anchor="middle" font-size="10.5" fill="#191919" font-weight="600">0, 2, 6, 0 tokens / expert</text>
    <text x="580" y="371" text-anchor="middle" font-size="9.5" fill="#6B6B6B">content-aware, but can collapse (E4 starves)</text>
  </g>

  <!-- Panel 3: Sinkhorn -->
  <g>
    <rect x="790" y="80" width="340" height="300" rx="10" fill="#FFFFFF" stroke="#191919" stroke-opacity="0.12" stroke-width="1.2"/>
    <text x="960" y="108" text-anchor="middle" font-size="13.5" font-weight="600" fill="#191919">Sinkhorn routing</text>
    <text x="960" y="126" text-anchor="middle" font-size="10" fill="#6B6B6B">iterative bi-normalization before top-k</text>

    <g font-size="9">
      <circle cx="830" cy="160" r="8" fill="#D97757"/>
      <circle cx="870" cy="160" r="8" fill="#D97757"/>
      <circle cx="910" cy="160" r="8" fill="#D97757"/>
      <circle cx="950" cy="160" r="8" fill="#D97757"/>
      <circle cx="990" cy="160" r="8" fill="#D97757"/>
      <circle cx="1030" cy="160" r="8" fill="#6B6B6B"/>
      <circle cx="1070" cy="160" r="8" fill="#6B6B6B"/>
      <circle cx="1110" cy="160" r="8" fill="#6B6B6B"/>
    </g>
    <text x="960" y="184" text-anchor="middle" font-size="9" fill="#6B6B6B">orange = code tokens · gray = text tokens</text>

    <rect x="815" y="290" width="60" height="40" rx="6" fill="#F3ECE2" stroke="#191919" stroke-width="1"/>
    <rect x="900" y="290" width="60" height="40" rx="6" fill="#F3ECE2" stroke="#191919" stroke-width="1"/>
    <rect x="985" y="290" width="60" height="40" rx="6" fill="#F3ECE2" stroke="#191919" stroke-width="1"/>
    <rect x="1070" y="290" width="60" height="40" rx="6" fill="#F3ECE2" stroke="#191919" stroke-width="1"/>
    <text x="845" y="314" text-anchor="middle" font-size="10.5" fill="#191919">E1</text>
    <text x="930" y="314" text-anchor="middle" font-size="10.5" fill="#191919">E2</text>
    <text x="1015" y="314" text-anchor="middle" font-size="10.5" fill="#191919">E3</text>
    <text x="1100" y="314" text-anchor="middle" font-size="10.5" fill="#191919">E4</text>

    <!-- forced-even but still somewhat content-correlated -->
    <g stroke="#D97757" stroke-opacity="0.55" stroke-width="1">
      <line x1="830" y1="168" x2="845" y2="290"/>
      <line x1="870" y1="168" x2="845" y2="290"/>
      <line x1="910" y1="168" x2="930" y2="290"/>
      <line x1="950" y1="168" x2="1015" y2="290"/>
      <line x1="990" y1="168" x2="1100" y2="290"/>
    </g>
    <g stroke="#6B6B6B" stroke-opacity="0.55" stroke-width="1">
      <line x1="1030" y1="168" x2="930" y2="290"/>
      <line x1="1070" y1="168" x2="1015" y2="290"/>
      <line x1="1110" y1="168" x2="1100" y2="290"/>
    </g>
    <text x="960" y="356" text-anchor="middle" font-size="10.5" fill="#191919" font-weight="600">2 tokens / expert, always</text>
    <text x="960" y="371" text-anchor="middle" font-size="9.5" fill="#6B6B6B">balanced like hash, but content still nudges assignment</text>
  </g>
</svg>
