    <rect x="259" y="37" width="34" height="34" fill="#8DA399" stroke="#191919" stroke-width="0.6"/>
    <rect x="296" y="37" width="34" height="34" fill="#8DA399" stroke="#191919" stroke-width="0.6"/>
    <rect x="333" y="37" width="34" height="34" fill="#8DA399" stroke="#191919" stroke-width="0.6"/>
    <rect x="370" y="37" width="34" height="34" fill="#8DA399" stroke="#191919" stroke-width="0.6"/>

    <rect x="74" y="74" width="34" height="34" fill="#D97757" stroke="#191919" stroke-width="0.6"/>
