  <text x="150" y="742" font-size="12" fill="#6B6B6B">at most ~1 microbatch's activations per stage in flight — same total bubble time as GPipe, far less memory</text>

  <text x="450" y="800" text-anchor="middle" font-size="13" font-weight="600" fill="#191919">bubble fraction, either schedule: (P − 1) / (P − 1 + M) — more microbatches ⇒ smaller bubble</text>
  <text x="450" y="822" text-anchor="middle" font-size="12" fill="#6B6B6B">schematic timing — real schedules also depend on per-stage compute time and communication latency</text>
