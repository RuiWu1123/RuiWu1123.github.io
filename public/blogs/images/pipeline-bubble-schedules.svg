    <rect x="333" y="74" width="34" height="34" fill="#8DA399" stroke="#191919" stroke-width="0.6"/>
    <rect x="370" y="74" width="34" height="34" fill="#8DA399" stroke="#191919" stroke-width="0.6"/>

    <rect x="111" y="111" width="34" height="34" fill="#D97757" stroke="#191919" stroke-width="0.6"/>
    <rect x="148" y="111" width="34" height="34" fill="#D97757" stroke="#191919" stroke-width="0.6"/>
    <rect x="185" y="111" width="34" height="34" fill="#D97757" stroke="#191919" stroke-width="0.6"/>
    <rect x="222" y="111" width="34" height="34" fill="#D97757" stroke="#191919" stroke-width="0.6"/>
    <rect x="259" y="111" width="34" height="34" fill="#8DA399" stroke="#191919" stroke-width="0.6"/>
    <rect x="296" y="111" width="34" height="34" fill="#8DA399" stroke="#191919" stroke-width="0.6"/>
    <rect x="333" y="111" width="34" height="34" fill="#8DA399" stroke="#191919" stroke-width="0.6"/>
    <rect x="370" y="111" width="34" height="34" fill="#8DA399" stroke="#191919" stroke-width="0.6"/>
  </g>
  <text x="150" y="510" font-size="12" fill="#6B6B6B">all M microbatches' activations must stay in memory until backward starts</text>

  <!-- Panel 3: 1F1B -->
  <text x="150" y="562" font-size="14.5" font-weight="600" fill="#191919">1F1B (PipeDream) — interleave as soon as possible</text>
