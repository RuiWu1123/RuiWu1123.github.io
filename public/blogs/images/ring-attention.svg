<svg viewBox="0 0 1000 780" xmlns="http://www.w3.org/2000/svg" font-family="Inter, -apple-system, sans-serif">
  <rect x="0" y="0" width="1000" height="780" fill="#F4F3EF"/>
  <text x="500" y="38" text-anchor="middle" font-size="22" font-weight="600" fill="#191919">Ring Attention: Distributed FlashAttention</text>
  <text x="500" y="60" text-anchor="middle" font-size="13" fill="#6B6B6B">Q stays put on each GPU; K/V blocks rotate around the ring while compute hides the transfer</text>

  <defs>
    <marker id="raarrow" markerWidth="9" markerHeight="9" refX="4.5" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#191919"/>
    </marker>
  </defs>

  <rect x="300" y="160" width="80" height="55" rx="5" fill="#8DA399" stroke="#191919" stroke-width="1"/>
  <text x="340" y="184" text-anchor="middle" font-size="12" fill="#191919">GPU 0</text>
  <text x="340" y="200" text-anchor="middle" font-size="10" fill="#191919">Q₀ fixed</text>

  <rect x="560" y="160" width="80" height="55" rx="5" fill="#8DA399" stroke="#191919" stroke-width="1"/>
  <text x="600" y="184" text-anchor="middle" font-size="12" fill="#191919">GPU 1</text>
  <text x="600" y="200" text-anchor="middle" font-size="10" fill="#191919">Q₁ fixed</text>

  <rect x="560" y="400" width="80" height="55" rx="5" fill="#8DA399" stroke="#191919" stroke-width="1"/>
  <text x="600" y="424" text-anchor="middle" font-size="12" fill="#191919">GPU 2</text>
  <text x="600" y="440" text-anchor="middle" font-size="10" fill="#191919">Q₂ fixed</text>

  <rect x="300" y="400" width="80" height="55" rx="5" fill="#8DA399" stroke="#191919" stroke-width="1"/>
  <text x="340" y="424" text-anchor="middle" font-size="12" fill="#191919">GPU 3</text>
  <text x="340" y="440" text-anchor="middle" font-size="10" fill="#191919">Q₃ fixed</text>

  <line x1="380" y1="187" x2="560" y2="187" stroke="#191919" stroke-width="1.4" marker-end="url(#raarrow)"/>
  <line x1="600" y1="215" x2="600" y2="400" stroke="#191919" stroke-width="1.4" marker-end="url(#raarrow)"/>
  <line x1="560" y1="427" x2="380" y2="427" stroke="#191919" stroke-width="1.4" marker-end="url(#raarrow)"/>
  <line x1="340" y1="400" x2="340" y2="215" stroke="#191919" stroke-width="1.4" marker-end="url(#raarrow)"/>

  <text x="470" y="177" text-anchor="middle" font-size="10.5" fill="#6B6B6B">K, V rotate →</text>
  <text x="470" y="437" text-anchor="middle" font-size="10.5" fill="#6B6B6B">← K, V rotate</text>

  <text x="500" y="500" text-anchor="middle" font-size="13" font-weight="600" fill="#191919">each hop: compute local attention against the current K/V block while the next block is already in flight</text>
  <text x="500" y="522" text-anchor="middle" font-size="12" fill="#6B6B6B">running max/sum accumulated online — same trick as one GPU's FlashAttention loop, spread across the ring instead</text>

  <!-- Bottom section: load balancing -->
  <text x="500" y="580" text-anchor="middle" font-size="15" font-weight="600" fill="#191919">causal masking makes naive chunks unequal — zigzag balances the work</text>

  <text x="240" y="612" text-anchor="middle" font-size="12" fill="#191919">naive: contiguous chunks</text>
  <rect x="150" y="665" width="50" height="25" fill="#D97757" stroke="#191919" stroke-width="0.8"/>
  <rect x="220" y="640" width="50" height="50" fill="#D97757" stroke="#191919" stroke-width="0.8"/>
  <rect x="290" y="615" width="50" height="75" fill="#D97757" stroke="#191919" stroke-width="0.8"/>
  <rect x="360" y="590" width="50" height="100" fill="#D97757" stroke="#191919" stroke-width="0.8"/>
  <text x="175" y="705" text-anchor="middle" font-size="10" fill="#6B6B6B">GPU0</text>
  <text x="245" y="705" text-anchor="middle" font-size="10" fill="#6B6B6B">GPU1</text>
  <text x="315" y="705" text-anchor="middle" font-size="10" fill="#6B6B6B">GPU2</text>
  <text x="385" y="705" text-anchor="middle" font-size="10" fill="#6B6B6B">GPU3</text>
  <text x="280" y="726" text-anchor="middle" font-size="11" fill="#6B6B6B">early-position GPUs sit idle — few keys to attend to under the mask</text>

  <text x="740" y="612" text-anchor="middle" font-size="12" fill="#191919">zigzag: balanced chunks</text>
  <rect x="650" y="627.5" width="50" height="62.5" fill="#8DA399" stroke="#191919" stroke-width="0.8"/>
  <rect x="720" y="627.5" width="50" height="62.5" fill="#8DA399" stroke="#191919" stroke-width="0.8"/>
  <rect x="790" y="627.5" width="50" height="62.5" fill="#8DA399" stroke="#191919" stroke-width="0.8"/>
  <rect x="860" y="627.5" width="50" height="62.5" fill="#8DA399" stroke="#191919" stroke-width="0.8"/>
  <text x="675" y="705" text-anchor="middle" font-size="10" fill="#6B6B6B">GPU0</text>
  <text x="745" y="705" text-anchor="middle" font-size="10" fill="#6B6B6B">GPU1</text>
  <text x="815" y="705" text-anchor="middle" font-size="10" fill="#6B6B6B">GPU2</text>
  <text x="885" y="705" text-anchor="middle" font-size="10" fill="#6B6B6B">GPU3</text>
  <text x="780" y="726" text-anchor="middle" font-size="11" fill="#6B6B6B">every GPU gets a mix of early + late positions — equal work</text>

  <line x1="80" y1="690" x2="940" y2="690" stroke="#191919" stroke-opacity="0.3"/>
</svg>
