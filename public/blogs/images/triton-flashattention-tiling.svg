<svg viewBox="0 0 900 680" xmlns="http://www.w3.org/2000/svg" font-family="Inter, -apple-system, sans-serif">
  <rect x="0" y="0" width="900" height="680" fill="#F4F3EF"/>
  <text x="450" y="38" text-anchor="middle" font-size="22" font-weight="600" fill="#191919">FlashAttention as a Triton Tiling Loop</text>
  <text x="450" y="60" text-anchor="middle" font-size="13" fill="#6B6B6B">the full attention matrix is never written to HBM — only small tiles ever exist at once</text>

  <defs>
    <marker id="farrow" markerWidth="9" markerHeight="9" refX="4.5" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#191919"/>
    </marker>
  </defs>

  <!-- Box A -->
  <rect x="250" y="86" width="400" height="64" rx="8" fill="#D97757" stroke="#191919" stroke-width="1.3"/>
  <text x="450" y="112" text-anchor="middle" font-size="13.5" font-weight="600" fill="#F4F3EF">load Q tile once</text>
  <text x="450" y="132" text-anchor="middle" font-size="11.5" fill="#F4F3EF">stays resident in shared memory for the whole loop</text>

  <line x1="450" y1="150" x2="450" y2="184" stroke="#191919" stroke-width="1.4" marker-end="url(#farrow)"/>

  <!-- Box B -->
  <rect x="220" y="188" width="460" height="66" rx="8" fill="#8DA399" stroke="#191919" stroke-width="1.3"/>
  <text x="450" y="212" text-anchor="middle" font-size="13.5" font-weight="600" fill="#F4F3EF">for each K/V tile j (streamed from HBM)</text>
  <text x="450" y="232" text-anchor="middle" font-size="11.5" font-family="monospace" fill="#F4F3EF">score = Q @ K_j^T   (one small tile, not the full matrix)</text>

  <line x1="450" y1="254" x2="450" y2="288" stroke="#191919" stroke-width="1.4" marker-end="url(#farrow)"/>

  <!-- Box C -->
  <rect x="190" y="292" width="520" height="70" rx="8" fill="#E3EBF2" stroke="#191919" stroke-width="1.3"/>
  <text x="450" y="317" text-anchor="middle" font-size="13.5" font-weight="600" fill="#191919">online softmax update</text>
  <text x="450" y="337" text-anchor="middle" font-size="11.5" fill="#191919">running max m_i, running sum l_i — no full row ever materialized</text>

  <line x1="450" y1="362" x2="450" y2="396" stroke="#191919" stroke-width="1.4" marker-end="url(#farrow)"/>

  <!-- Box D -->
  <rect x="220" y="400" width="460" height="66" rx="8" fill="#F3ECE2" stroke="#191919" stroke-width="1.3"/>
  <text x="450" y="424" text-anchor="middle" font-size="13.5" font-weight="600" fill="#191919">rescale + accumulate</text>
  <text x="450" y="444" text-anchor="middle" font-size="11.5" font-family="monospace" fill="#191919">O_i = O_i * correction + P_ij @ V_j</text>

  <!-- loop-back path: right angles only -->
  <polyline points="680,433 780,433 780,221 680,221" fill="none" stroke="#191919" stroke-width="1.4" marker-end="url(#farrow)"/>
  <text x="792" y="330" font-size="11.5" fill="#191919" transform="rotate(-90 792 330)" text-anchor="middle">repeat for next K/V tile</text>

  <line x1="450" y1="466" x2="450" y2="500" stroke="#191919" stroke-width="1.4" marker-end="url(#farrow)"/>

  <!-- Box E -->
  <rect x="250" y="504" width="400" height="64" rx="8" fill="#191919" stroke="#191919" stroke-width="1.3"/>
  <text x="450" y="530" text-anchor="middle" font-size="13.5" font-weight="600" fill="#F4F3EF">loop ends → write O_i tile to HBM</text>
  <text x="450" y="550" text-anchor="middle" font-size="11.5" fill="#F4F3EF">once — the intermediate score/softmax tiles never were</text>

  <text x="450" y="620" text-anchor="middle" font-size="13" fill="#191919" font-weight="600">same tiling idea as matmul (Section 6 of the GPU post), plus a running softmax so tiles don't need each other's full context</text>
</svg>
