<svg viewBox="0 0 960 460" xmlns="http://www.w3.org/2000/svg" font-family="Inter, -apple-system, sans-serif">
  <rect x="0" y="0" width="960" height="460" fill="#F4F3EF"/>
  <text x="480" y="38" text-anchor="middle" font-size="22" font-weight="600" fill="#191919">Same Element Count, Very Different Cost</text>
  <text x="480" y="60" text-anchor="middle" font-size="13" fill="#6B6B6B">HBM rewards reading nearby addresses together, and penalizes scattering the same reads apart</text>

  <!-- Row 1: coalesced -->
  <text x="80" y="108" font-size="14" font-weight="600" fill="#191919">contiguous (coalesced)</text>
  <text x="80" y="126" font-size="11.5" font-family="monospace" fill="#6B6B6B">offs = pid*BLOCK_SIZE + tl.arange(0, BLOCK_SIZE)</text>

  <g>
    <rect x="80"  y="150" width="36" height="50" fill="#F3ECE2" stroke="#191919" stroke-width="1"/>
    <rect x="120" y="150" width="36" height="50" fill="#F3ECE2" stroke="#191919" stroke-width="1"/>
    <rect x="160" y="150" width="36" height="50" fill="#F3ECE2" stroke="#191919" stroke-width="1"/>
    <rect x="200" y="150" width="36" height="50" fill="#8DA399" stroke="#191919" stroke-width="1"/>
    <rect x="240" y="150" width="36" height="50" fill="#8DA399" stroke="#191919" stroke-width="1"/>
    <rect x="280" y="150" width="36" height="50" fill="#8DA399" stroke="#191919" stroke-width="1"/>
    <rect x="320" y="150" width="36" height="50" fill="#8DA399" stroke="#191919" stroke-width="1"/>
    <rect x="360" y="150" width="36" height="50" fill="#8DA399" stroke="#191919" stroke-width="1"/>
    <rect x="400" y="150" width="36" height="50" fill="#8DA399" stroke="#191919" stroke-width="1"/>
    <rect x="440" y="150" width="36" height="50" fill="#8DA399" stroke="#191919" stroke-width="1"/>
    <rect x="480" y="150" width="36" height="50" fill="#8DA399" stroke="#191919" stroke-width="1"/>
    <rect x="520" y="150" width="36" height="50" fill="#8DA399" stroke="#191919" stroke-width="1"/>
    <rect x="560" y="150" width="36" height="50" fill="#8DA399" stroke="#191919" stroke-width="1"/>
    <rect x="600" y="150" width="36" height="50" fill="#8DA399" stroke="#191919" stroke-width="1"/>
    <rect x="640" y="150" width="36" height="50" fill="#8DA399" stroke="#191919" stroke-width="1"/>
    <rect x="680" y="150" width="36" height="50" fill="#F3ECE2" stroke="#191919" stroke-width="1"/>
    <rect x="720" y="150" width="36" height="50" fill="#F3ECE2" stroke="#191919" stroke-width="1"/>
    <rect x="760" y="150" width="36" height="50" fill="#F3ECE2" stroke="#191919" stroke-width="1"/>
    <rect x="800" y="150" width="36" height="50" fill="#E6E4DD" stroke="#191919" stroke-width="1" stroke-dasharray="3 2"/>
    <rect x="840" y="150" width="36" height="50" fill="#E6E4DD" stroke="#191919" stroke-width="1" stroke-dasharray="3 2"/>
  </g>
  <text x="330" y="222" text-anchor="middle" font-size="12" fill="#191919" font-weight="600">one contiguous burst → 1 memory transaction</text>
  <text x="858" y="222" text-anchor="middle" font-size="11" fill="#6B6B6B">masked tail:</text>
  <text x="858" y="236" text-anchor="middle" font-size="11" fill="#6B6B6B">no traffic at all</text>

  <!-- Row 2: strided -->
  <text x="80" y="288" font-size="14" font-weight="600" fill="#191919">strided / scattered</text>
  <text x="80" y="306" font-size="11.5" font-family="monospace" fill="#6B6B6B">offs = pid + i * stride   (e.g. a matrix column)</text>

  <g>
    <rect x="80"  y="330" width="36" height="50" fill="#D97757" stroke="#191919" stroke-width="1"/>
    <rect x="120" y="330" width="36" height="50" fill="#F3ECE2" stroke="#191919" stroke-width="1"/>
    <rect x="160" y="330" width="36" height="50" fill="#F3ECE2" stroke="#191919" stroke-width="1"/>
    <rect x="200" y="330" width="36" height="50" fill="#D97757" stroke="#191919" stroke-width="1"/>
    <rect x="240" y="330" width="36" height="50" fill="#F3ECE2" stroke="#191919" stroke-width="1"/>
    <rect x="280" y="330" width="36" height="50" fill="#F3ECE2" stroke="#191919" stroke-width="1"/>
    <rect x="320" y="330" width="36" height="50" fill="#D97757" stroke="#191919" stroke-width="1"/>
    <rect x="360" y="330" width="36" height="50" fill="#F3ECE2" stroke="#191919" stroke-width="1"/>
    <rect x="400" y="330" width="36" height="50" fill="#F3ECE2" stroke="#191919" stroke-width="1"/>
    <rect x="440" y="330" width="36" height="50" fill="#D97757" stroke="#191919" stroke-width="1"/>
    <rect x="480" y="330" width="36" height="50" fill="#F3ECE2" stroke="#191919" stroke-width="1"/>
    <rect x="520" y="330" width="36" height="50" fill="#F3ECE2" stroke="#191919" stroke-width="1"/>
    <rect x="560" y="330" width="36" height="50" fill="#D97757" stroke="#191919" stroke-width="1"/>
    <rect x="600" y="330" width="36" height="50" fill="#F3ECE2" stroke="#191919" stroke-width="1"/>
    <rect x="640" y="330" width="36" height="50" fill="#F3ECE2" stroke="#191919" stroke-width="1"/>
    <rect x="680" y="330" width="36" height="50" fill="#D97757" stroke="#191919" stroke-width="1"/>
    <rect x="720" y="330" width="36" height="50" fill="#F3ECE2" stroke="#191919" stroke-width="1"/>
    <rect x="760" y="330" width="36" height="50" fill="#F3ECE2" stroke="#191919" stroke-width="1"/>
    <rect x="800" y="330" width="36" height="50" fill="#D97757" stroke="#191919" stroke-width="1"/>
    <rect x="840" y="330" width="36" height="50" fill="#F3ECE2" stroke="#191919" stroke-width="1"/>
  </g>
  <text x="460" y="402" text-anchor="middle" font-size="12" fill="#191919" font-weight="600">same 7 useful elements → up to 7 separate transactions, bandwidth wasted on the gaps</text>

  <text x="480" y="440" text-anchor="middle" font-size="12.5" fill="#6B6B6B">this is why tensor layout (row-major vs. column access) changes real Triton kernel speed by multiples, not percentages</text>
</svg>
